<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QMS — Queue Management System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:#0f1923;--ink2:#2d3f52;--muted:#6b7d8f;--faint:#9aaab8;
  --navy:#0d2340;--navy2:#1a3a60;--gold:#c49a2a;--gold2:#e0b93e;--goldtint:#fdf6e3;
  --bg:#f2f5f9;--surface:#ffffff;--line:#e2e8f0;--line2:#cbd5e1;
  --green:#0ea371;--red:#e03434;--orange:#d97706;--blue:#2563eb;--purple:#7c3aed;
  --greentint:#ecfdf5;--redtint:#fef2f2;--orangetint:#fffbeb;--bluetint:#eff6ff;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow2:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.08);
  --sidebar:240px;--trans:.18s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100%;display:flex;overflow:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.mono{font-family:'DM Mono',monospace}
.sidebar{width:var(--sidebar);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:fixed;left:0;top:0;z-index:40;overflow-y:auto;overflow-x:hidden}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(145deg,var(--gold),var(--gold2));display:grid;place-items:center;font-weight:700;font-size:15px;color:var(--navy);flex-shrink:0}
.brand-name{line-height:1.2}
.brand-name strong{display:block;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px}
.brand-name span{font-size:10px;color:rgba(255,255,255,.42);font-weight:500}
.nav-section{padding:12px 10px;flex:1}
.nav-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r2);color:rgba(255,255,255,.55);font-size:13.5px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background var(--trans),color var(--trans);margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.nav-item .nav-icon{width:18px;height:18px;opacity:.7;flex-shrink:0;display:grid;place-items:center}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--gold);color:var(--navy);border-radius:99px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,.08)}
.role-pill{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.07);border-radius:var(--r2);padding:8px 10px;margin-bottom:8px}
.role-pill span{font-size:11px;color:rgba(255,255,255,.5);font-weight:500}
.role-pill strong{font-size:13px;color:#fff;font-weight:600}
.role-btn{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.7);border-radius:var(--r3);padding:3px 8px;font-size:11px;font-weight:600;transition:background var(--trans)}
.role-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.clock-display{text-align:center;padding:4px 0 2px}
.clock-display .time{font-size:18px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.clock-display .date{font-size:10px;color:rgba(255,255,255,.38);font-weight:500;margin-top:1px}
.main-area{margin-left:var(--sidebar);flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:0 28px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;flex-shrink:0}
.page-title{font-size:15px;font-weight:700;color:var(--ink);flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px}
.content{padding:24px 28px 40px;flex:1}
.view{display:none}.view.active{display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;border:1.5px solid var(--line2);background:var(--surface);color:var(--ink2);transition:all var(--trans);white-space:nowrap;cursor:pointer}
.btn:hover{border-color:#aab8cc;background:#f8fafc;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy2);border-color:var(--navy2)}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.gold:hover{background:#b8891f}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.green:hover{background:#0b8e62}
.btn.red{background:var(--red);color:#fff;border-color:var(--red)}
.btn.red:hover{background:#c42a2a}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--bg);color:var(--ink);border-color:var(--line)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn.xs{padding:3px 8px;font-size:11px;border-radius:6px}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--line);box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.card-title{font-size:13.5px;font-weight:700;color:var(--ink)}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}
.card-body{padding:16px 20px}
.card-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--line);padding:18px 20px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.kpi-value{font-size:30px;font-weight:700;color:var(--ink);line-height:1.1;margin-top:6px;letter-spacing:-1px}
.kpi-note{font-size:11.5px;color:var(--faint);margin-top:4px}
.kpi-card.highlight .kpi-value{color:var(--green)}
.kpi-card.gold .kpi-value{color:var(--gold)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.stack{display:flex;flex-direction:column;gap:16px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;border-radius:6px;padding:2px 7px;gap:4px;white-space:nowrap}
.badge.green{background:var(--greentint);color:#065f46}
.badge.red{background:var(--redtint);color:#991b1b}
.badge.orange{background:var(--orangetint);color:#92400e}
.badge.blue{background:var(--bluetint);color:#1d4ed8}
.badge.gray{background:#f1f5f9;color:var(--muted)}
.badge.gold{background:var(--goldtint);color:#92400e}
.badge.navy{background:#eef2ff;color:var(--navy)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px}
.page-header-left h1{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.4px}
.page-header-left p{font-size:13px;color:var(--muted);margin-top:3px}
.page-header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--bg);text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--line);color:var(--ink2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafbfc}
.tbl td b{color:var(--ink);font-weight:600}
.tbl td .sub{font-size:11px;color:var(--muted);margin-top:1px}
.tbl td.actions{white-space:nowrap;display:flex;gap:5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field.col3{grid-column:span 2}
.label{font-size:12px;font-weight:600;color:var(--ink2)}
.input,.select,.textarea{border:1.5px solid var(--line2);border-radius:var(--r3);padding:9px 12px;font-size:13.5px;color:var(--ink);background:var(--surface);transition:border-color var(--trans),box-shadow var(--trans);outline:none}
.input:focus,.select:focus,.textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,35,64,.09)}
.textarea{resize:vertical;min-height:72px}
.select{cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line)}
.toggle-row:last-child{border-bottom:none}
.toggle-info strong{font-size:13.5px;font-weight:600;color:var(--ink);display:block}
.toggle-info span{font-size:12px;color:var(--muted)}
.switch{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-track{position:absolute;inset:0;background:var(--line2);border-radius:99px;cursor:pointer;transition:background var(--trans)}
.switch input:checked~.switch-track{background:var(--green)}
.switch-thumb{position:absolute;left:3px;top:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform var(--trans);pointer-events:none}
.switch input:checked~.switch-thumb{transform:translateX(16px)}
.q-card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);padding:16px;transition:box-shadow var(--trans),border-color var(--trans);box-shadow:var(--shadow)}
.q-card:hover{box-shadow:var(--shadow2);border-color:var(--line2)}
.q-card.is-closed{opacity:.55}
.q-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.q-num{font-size:12px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace}
.q-name{font-size:15px;font-weight:700;color:var(--ink);margin-top:2px}
.q-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.q-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.q-purpose{font-size:12px;color:var(--ink2);margin-top:8px;line-height:1.4}
.q-actions{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
.rot-strip{display:flex;flex-direction:column;gap:6px}
.rot-pill{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:var(--r2);padding:10px 14px;background:var(--surface);transition:all var(--trans)}
.rot-pill.current{border-color:var(--green);background:var(--greentint)}
.rot-pill.priority{border-color:var(--orange);background:var(--orangetint)}
.rot-pill.inactive{opacity:.45}
.rot-order{width:24px;height:24px;border-radius:50%;background:var(--bg);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.rot-pill.current .rot-order{background:var(--green);color:#fff}
.rot-name{font-size:13.5px;font-weight:600;color:var(--ink);flex:1}
.rot-status{font-size:11.5px;color:var(--muted)}
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{display:flex;align-items:center;gap:12px;border-radius:var(--r2);padding:12px 14px;border:1.5px solid transparent}
.alert-item.red{background:var(--redtint);border-color:#fecaca}
.alert-item.orange{background:var(--orangetint);border-color:#fed7aa}
.alert-item.blue{background:var(--bluetint);border-color:#bfdbfe}
.alert-icon{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.alert-item.red .alert-icon{background:#fee2e2}
.alert-item.orange .alert-icon{background:#ffedd5}
.alert-item.blue .alert-icon{background:#dbeafe}
.alert-text strong{font-size:13px;font-weight:600;color:var(--ink);display:block}
.alert-text span{font-size:11.5px;color:var(--muted)}
.alert-item .alert-action{margin-left:auto;flex-shrink:0}
.success-note{display:flex;align-items:center;gap:10px;padding:14px;background:var(--greentint);border-radius:var(--r2);font-size:13px;font-weight:600;color:#065f46;border:1.5px solid #a7f3d0}
.empty-state{text-align:center;padding:40px 20px;color:var(--faint)}
.empty-state p{font-size:13px}
.info-note{background:var(--bluetint);border:1.5px solid #bfdbfe;border-radius:var(--r2);padding:12px 14px;font-size:13px;color:#1e40af;line-height:1.5}
.danger-note{background:var(--redtint);border:1.5px solid #fecaca;border-radius:var(--r2);padding:12px 14px;font-size:13px;color:#991b1b;line-height:1.5}
.warn-note{background:var(--orangetint);border:1.5px solid #fed7aa;border-radius:var(--r2);padding:12px 14px;font-size:13px;color:#92400e;line-height:1.5}
.hist-item{padding:10px 0;border-bottom:1px solid var(--line)}
.hist-item:last-child{border-bottom:none}
.hist-item strong{font-size:13px;font-weight:600;color:var(--ink)}
.hist-item .mini{font-size:11.5px;color:var(--muted);margin-top:3px}
.report-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.report-card h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.report-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}
.report-row:last-child{border-bottom:none}
.report-row .rk{font-size:12.5px;font-weight:500;color:var(--ink2)}
.report-row .rv{font-size:13px;font-weight:700;color:var(--ink)}
.bar-track{height:4px;background:var(--line);border-radius:99px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--navy);border-radius:99px;transition:width .4s ease}
.audit-item{display:grid;grid-template-columns:130px 1fr auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.audit-item:last-child{border-bottom:none}
.audit-time{color:var(--muted);font-family:'DM Mono',monospace;font-size:11.5px}
.audit-action{font-weight:600;color:var(--ink)}
.audit-detail{font-size:11px;color:var(--muted);margin-top:1px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warn{background:var(--orange)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.22);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal.small{max-width:400px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 16px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:16px;font-weight:700;color:var(--ink)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-body .form-grid{margin-top:0}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.close-btn{width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:grid;place-items:center;color:var(--muted);font-size:16px;transition:background var(--trans)}
.close-btn:hover{background:var(--line);color:var(--ink)}
.role-banner{background:var(--gold);color:var(--navy);text-align:center;padding:3px;font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;position:fixed;left:var(--sidebar);right:0;top:0;z-index:50;display:none}
.spacer{height:16px}
.divider{height:1px;background:var(--line);margin:16px 0}
.setting-input{max-width:200px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#9aaab8}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}}
@media(max-width:800px){:root{--sidebar:0px}.sidebar{transform:translateX(-240px);transition:transform .25s}.sidebar.open{transform:translateX(0);--sidebar:240px}.main-area{margin-left:0}.kpi-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.field.col3{grid-column:auto}}
@media print{.sidebar,.topbar,.role-banner,.toast,.modal-backdrop,.btn,.q-actions,.page-header-actions{display:none!important}.main-area{margin-left:0}.view{display:block!important}.view:not(.active){display:none!important}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark">Q</div>
    <div class="brand-name"><strong>QMS</strong><span>Queue Management</span></div>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Operations</div>
    <button class="nav-item active" id="nav-dashboard" onclick="switchView('dashboard')"><span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity=".9"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity=".6"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity=".6"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity=".4"/></svg></span>Dashboard</button>
    <button class="nav-item" id="nav-rotation" onclick="switchView('rotation')"><span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M4 4v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 10A8 8 0 0 0 5.5 5.5L4 4m16 16-1.5-1.5A8 8 0 0 1 4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>CRO Rotation</button>
    <button class="nav-item" id="nav-entry" onclick="switchView('entry')"><span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>Customer Entry</button>
    <button class="nav-item" id="nav-live" onclick="switchView('live')"><span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="currentColor"/><circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="2" opacity=".5"/></svg></span>Live Queue<span class="nav-badge" id="navBadgeLive">0</span></button>
    <button class="nav-item" id="nav-followups" onclick="switchView('followups')"><span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M3 5h18M3 10h18M3 15h12M3 20h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>Follow-ups<span class="nav-badge" id="navBadgeFu" style="display:none"></span></button>
    <div class="nav-label" style="margin-top:10px">Analytics</div>

<script>
'use strict';
const STORE_KEY='retail_queue_management_v1';
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=(p='id')=>p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);
const $=id=>document.getElementById(id);
const fmtTime=iso=>iso?new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'—';
const fmtDT=iso=>iso?new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
const minsBetween=(a,b)=>a&&b?Math.max(0,Math.round((new Date(b)-new Date(a))/60000)):0;
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
let state,role='SM',activeView='dashboard',toastTimer;
const PAGE_TITLES={dashboard:'Dashboard',rotation:'CRO Rotation',entry:'Customer Entry',live:'Live Queue',followups:'Follow-ups',reports:'Reports',settings:'Settings'};
const DEFAULT_CROS=[{id:uid('cro'),name:'Rahul',code:'CRO-01',active:true},{id:uid('cro'),name:'Priya',code:'CRO-02',active:true},{id:uid('cro'),name:'Amit',code:'CRO-03',active:true},{id:uid('cro'),name:'Neha',code:'CRO-04',active:true},{id:uid('cro'),name:'Suresh',code:'CRO-05',active:true}];
const DEFAULT_SETTINGS={storeName:'Saagar Traders',queuePrefix:'Q',waitAlertMins:10,autoAllocate:true,requireBillForPurchase:true,requireJobForService:true,allowGreeterClose:false,smCanGiveNextOpportunity:true,lockEditsAfterEOD:true};
function initialState(){return{settings:{...DEFAULT_SETTINGS},role:'SM',cros:DEFAULT_CROS,rotations:[],customers:[],followups:[],audit:[],lastBackup:null}}
function load(){try{state=JSON.parse(localStorage.getItem(STORE_KEY)||'null')||initialState()}catch(e){state=initialState()}state.settings={...DEFAULT_SETTINGS,...(state.settings||{})};state.cros=state.cros?.length?state.cros:DEFAULT_CROS;state.rotations=state.rotations||[];state.customers=state.customers||[];state.followups=state.followups||[];state.audit=state.audit||[];role=state.role||'SM'}
function save(action,details){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){toast('Save failed. Storage may be full.','error')}if(action)addAudit(action,details,true);renderAll()}
function addAudit(action,details={},skipSave=false){state.audit.unshift({id:uid('aud'),at:new Date().toISOString(),role,action,details});state.audit=state.audit.slice(0,600);if(!skipSave)localStorage.setItem(STORE_KEY,JSON.stringify(state))}
function toast(msg,type=''){const t=$('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800)}
function requireSM(){if(role!=='SM'&&role!=='Admin'){toast('SM / Admin access required.','error');return false}return true}
function closeModal(){$('modalBackdrop').classList.add('hidden');$('modalBody').innerHTML='';$('modalFoot').innerHTML=''}
function openModal(title,body,foot='',small=false){$('modalTitle').textContent=title;$('modalBody').innerHTML=body;$('modalFoot').innerHTML=foot;$('modalBox').className='modal'+(small?' small':'');$('modalBackdrop').classList.remove('hidden')}
function switchView(name){activeView=name;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$('view-'+name).classList.add('active');document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));$('nav-'+name).classList.add('active');$('topbarTitle').textContent=PAGE_TITLES[name]||name;renderAll()}
function switchRole(){const roles=['SM','Greeter','CRO','Admin'];role=roles[(roles.indexOf(role)+1)%roles.length];state.role=role;save('role.switch',{role});toast('Role: '+role)}
function tick(){const d=new Date();$('clockTime').textContent=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});$('clockDate').textContent=d.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})}
setInterval(tick,1000);
function currentRotation(){return state.rotations.find(r=>r.date===todayISO()&&r.status==='Active')||null}
function todaysCustomers(){return state.customers.filter(c=>(c.entryTime||'').slice(0,10)===todayISO())}
function activeCustomers(){return todaysCustomers().filter(c=>c.status!=='Closed')}
function customerById(id){return state.customers.find(c=>c.id===id)}
function croName(id){return state.cros.find(c=>c.id===id)?.name||'—'}
function rotationItem(rot,croId){return rot?.items?.find(i=>i.croId===croId)}
function activeRotationItems(rot=currentRotation()){return(rot?.items||[]).filter(i=>i.active&&i.status!=='Inactive'&&i.status!=='Half Day'&&state.cros.find(c=>c.id===i.croId)?.active)}
function getQueueNo(){const n=todaysCustomers().length+1;return`${state.settings.queuePrefix}-${String(n).padStart(3,'0')}`}
function calcStats(list=todaysCustomers()){const total=list.length,pur=list.filter(c=>c.outcome==='Purchase').length,svc=list.filter(c=>c.outcome==='Service').length,non=list.filter(c=>c.outcome==='Non Purchase').length,closed=list.filter(c=>c.status==='Closed').length,sales=list.reduce((s,c)=>s+(+c.purchaseAmount||0),0),waits=list.filter(c=>c.attendStart).map(c=>minsBetween(c.entryTime,c.attendStart)),avgWait=waits.length?Math.round(waits.reduce((a,b)=>a+b,0)/waits.length):0,conv=total?Math.round(pur/total*100):0;return{total,pur,svc,non,closed,sales,avgWait,conv,open:total-closed}}
function renderAll(){$('roleBtn').textContent='Role: '+role;$('roleName').textContent=role;const openCount=activeCustomers().length;$('navBadgeLive').textContent=openCount;$('navBadgeLive').style.display=openCount?'':'none';const fuDue=state.followups.filter(f=>f.status==='Pending'&&f.dueDate<=todayISO()).length;const fuBadge=$('navBadgeFu');fuBadge.textContent=fuDue;fuBadge.style.display=fuDue?'':'none';if(activeView==='dashboard')renderDashboard();else if(activeView==='rotation')renderRotation();else if(activeView==='entry')renderEntry();else if(activeView==='live')renderLive();else if(activeView==='followups')renderFollowups();else if(activeView==='reports')renderReports();else if(activeView==='settings')renderSettings()}
function renderDashboard(){const s=calcStats(),rot=currentRotation();$('view-dashboard').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>${esc(state.settings.storeName)}</h1><p>${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</p></div><div class="page-header-actions"><button class="btn primary" onclick="switchView('entry')">+ Add Walk-in</button><button class="btn" onclick="switchView('rotation')">CRO Rotation</button></div></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-label">Walk-ins</div><div class="kpi-value">${s.total}</div><div class="kpi-note">Today</div></div><div class="kpi-card highlight"><div class="kpi-label">Purchases</div><div class="kpi-value">${s.pur}</div><div class="kpi-note">Converted</div></div><div class="kpi-card"><div class="kpi-label">Service</div><div class="kpi-value">${s.svc}</div><div class="kpi-note">Jobs</div></div><div class="kpi-card"><div class="kpi-label">Non Purchase</div><div class="kpi-value">${s.non}</div><div class="kpi-note">Lost / Pending</div></div><div class="kpi-card"><div class="kpi-label">Conversion</div><div class="kpi-value">${s.conv}%</div><div class="kpi-note">Purchase rate</div></div><div class="kpi-card gold"><div class="kpi-label">Sales</div><div class="kpi-value">₹${s.sales>=1000?(s.sales/1000).toFixed(1)+'k':s.sales.toLocaleString('en-IN')}</div><div class="kpi-note">Closed value</div></div></div><div class="grid-2" style="margin-bottom:16px"><div class="card"><div class="card-head"><div><div class="card-title">Today's Rotation</div><div class="card-sub">Chronological CRO order</div></div><div style="display:flex;gap:6px;align-items:center">${rot?'<span class="badge green"><span class="dot"></span> Active</span>':'<span class="badge red">Not Created</span>'}<button class="btn sm ghost" onclick="switchView('rotation')">Manage →</button></div></div><div class="card-body">${rotationStrip()}</div></div><div class="card"><div class="card-head"><div><div class="card-title">Attention Required</div><div class="card-sub">Operational exceptions</div></div></div><div class="card-body">${attentionList()}</div></div></div><div class="card"><div class="card-head"><div><div class="card-title">Active Queue</div><div class="card-sub">${activeCustomers().length} customer(s) not yet closed</div></div><button class="btn sm ghost" onclick="switchView('live')">Full Queue →</button></div><div class="card-body">${activeCustomers().length===0?`<div class="empty-state"><p>No active customers right now</p></div>`:`<div class="grid-3">${activeCustomers().slice(0,6).map(queueCard).join('')}</div>`}</div></div>`}
function attentionList(){const items=[];if(!currentRotation())items.push(['red','⚠','Rotation not created','SM must create CRO order before walk-ins can be allocated.','rotation']);activeCustomers().forEach(c=>{const wait=minsBetween(c.entryTime,new Date().toISOString());if(!c.assignedCroId&&wait>=state.settings.waitAlertMins)items.push(['orange','⏱',`${c.queueNo} waiting ${wait} min`,'Customer has crossed the waiting alert limit.','live']);if(c.exitTime&&!c.outcome)items.push(['red','!',`${c.queueNo} exited but not closed`,'CRO/SM must record outcome.','live'])});const overdue=state.followups.filter(f=>f.status==='Pending'&&f.dueDate<=todayISO());if(overdue.length)items.push(['blue','📋',`${overdue.length} follow-up(s) due today`,'Pending customer follow-up tasks.','followups']);if(!items.length)return`<div class="success-note">✓ No exceptions — all clear</div>`;return`<div class="alert-list">${items.map(i=>`<div class="alert-item ${i[0]}"><div class="alert-icon">${i[1]}</div><div class="alert-text"><strong>${esc(i[2])}</strong><span>${esc(i[3])}</span></div><button class="btn xs ghost alert-action" onclick="switchView('${i[4]}')">Open</button></div>`).join('')}</div>`}
function rotationStrip(){const rot=currentRotation();if(!rot)return`<div class="warn-note">No rotation created for today. SM should create a fresh morning list.</div>`;const pending=rot.priorityCroId;return`<div class="rot-strip">${(rot.items||[]).sort((a,b)=>a.order-b.order).map(i=>{const isCurrent=i.croId===rot.currentCroId,isPriority=i.croId===pending,isInactive=!i.active||i.status==='Half Day'||i.status==='Inactive';return`<div class="rot-pill ${isCurrent?'current':''} ${isPriority?'priority':''} ${isInactive?'inactive':''}"><div class="rot-order">${i.order}</div><div class="rot-name">${esc(croName(i.croId))}</div><div class="rot-status">${isCurrent?'← Current turn':isPriority?'Next opportunity':esc(i.status||'Available')}</div>${isCurrent?'<span class="badge green" style="margin-left:auto">Now</span>':isPriority?'<span class="badge orange" style="margin-left:auto">Next</span>':isInactive?'<span class="badge gray" style="margin-left:auto">Off</span>':''}</div>`}).join('')}</div>`}
function renderRotation(){const rot=currentRotation();$('view-rotation').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>CRO Rotation</h1><p>Daily turn management — skips, reorders and EOD control</p></div><div class="page-header-actions"><button class="btn" onclick="addCroToMaster()">Add CRO Master</button><button class="btn" onclick="openAddCroToRotation()" ${!rot?'disabled':''}>Add to Today</button><button class="btn primary" onclick="createRotation()">Create Fresh List</button><button class="btn" style="border-color:var(--orange);color:var(--orange)" onclick="closeEOD()" ${!rot?'disabled':''}>Close EOD</button></div></div><div class="grid-2" style="margin-bottom:16px"><div class="card"><div class="card-head"><div><div class="card-title">Today's Order</div><div class="card-sub">Fresh list required every morning</div></div>${rot?'<span class="badge green"><span class="dot"></span> Active</span>':'<span class="badge red">Not Created</span>'}</div><div class="card-body">${rotationStrip()}</div></div><div class="card"><div class="card-head"><div><div class="card-title">Rotation Rules</div></div></div><div class="card-body"><div class="info-note">If the current CRO is unavailable, Greeter records the reason. SM may give the skipped CRO the next customer. If missed again, priority is cancelled and the CRO waits for the full rotation to return naturally.</div></div></div></div><div class="card" style="margin-bottom:16px"><div class="card-head"><div><div class="card-title">CRO Order & Availability</div></div></div><div class="card-body" style="padding:0">${rotationTable(rot)}</div></div><div class="card"><div class="card-head"><div><div class="card-title">Skipped Turn Audit</div><div class="card-sub">Every skip recorded with reason and CRO info</div></div></div><div class="card-body" style="padding:0">${turnAuditTable()}</div></div>`}
function rotationTable(rot){if(!rot)return'<div style="padding:20px"><div class="warn-note">Create today\'s rotation first.</div></div>';return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Order</th><th>CRO</th><th>Status</th><th>Assigned</th><th>Skips</th><th>Actions</th></tr></thead><tbody>${rot.items.sort((a,b)=>a.order-b.order).map(i=>{const assigned=todaysCustomers().filter(c=>c.assignedCroId===i.croId).length,skipped=(rot.turnEvents||[]).filter(e=>e.expectedCroId===i.croId&&e.skipped).length,st=i.status||'Available',badgeCls=['Available','Busy'].includes(st)?'green':(st==='Half Day'||st==='Inactive')?'red':'orange';return`<tr><td>${i.order}</td><td><b>${esc(croName(i.croId))}</b><div class="sub mono">${esc(state.cros.find(c=>c.id===i.croId)?.code||'')}</div></td><td><span class="badge ${badgeCls}">${esc(st)}</span></td><td>${assigned}</td><td>${skipped}</td><td><div style="display:flex;gap:5px;flex-wrap:wrap"><button class="btn sm" onclick="setCroStatus('${i.croId}')">Status</button><button class="btn sm ghost" onclick="moveCro('${i.croId}',-1)">↑</button><button class="btn sm ghost" onclick="moveCro('${i.croId}',1)">↓</button><button class="btn sm" style="color:var(--red);border-color:#fca5a5" onclick="removeCroToday('${i.croId}')">Remove</button></div></td></tr>`}).join('')}</tbody></table></div>`}
function turnAuditTable(){const rot=currentRotation(),ev=(rot?.turnEvents||[]).slice().reverse();if(!ev.length)return'<div style="padding:20px"><div class="empty-state"><p>No skipped turn events today</p></div></div>';return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Time</th><th>Queue</th><th>Expected CRO</th><th>Actual CRO</th><th>Reason</th><th>Next Opp.</th><th>By</th></tr></thead><tbody>${ev.map(e=>`<tr><td class="mono" style="font-size:12px">${fmtTime(e.at)}</td><td>${esc(e.queueNo||'—')}</td><td>${esc(croName(e.expectedCroId))}</td><td>${esc(croName(e.actualCroId))}</td><td>${esc(e.reason||'—')}<div class="sub">${esc(e.note||'')}</div></td><td><span class="badge ${e.nextOpportunity?'orange':'gray'}">${e.nextOpportunity?'Yes':'No'}${e.priorityCancelled?' · Cancelled':''}</span></td><td>${esc(e.by||'—')}</td></tr>`).join('')}</tbody></table></div>`}
function createRotation(){if(!requireSM())return;const active=state.cros.filter(c=>c.active);openModal('Create Daily CRO Order',`<div class="info-note" style="margin-bottom:14px">Creates today's rotation. An existing active rotation will be closed.</div><div id="orderEditor">${active.map((c,i)=>`<div class="toggle-row"><div class="toggle-info"><strong>${i+1}. ${esc(c.name)}</strong><span>${esc(c.code||'')}</span></div><label class="switch"><input type="checkbox" checked data-cro="${c.id}"><div class="switch-track"></div><div class="switch-thumb"></div></label></div>`).join('')}</div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmCreateRotation()">Create Rotation</button>`)}
function confirmCreateRotation(){if(!requireSM())return;const included=[...document.querySelectorAll('#orderEditor input:checked')].map(x=>x.dataset.cro);if(!included.length){toast('Select at least one CRO.','error');return}state.rotations.filter(r=>r.date===todayISO()&&r.status==='Active').forEach(r=>r.status='Closed');const rot={id:uid('rot'),date:todayISO(),createdAt:new Date().toISOString(),createdBy:role,status:'Active',currentCroId:included[0],priorityCroId:null,closedAt:null,items:included.map((id,idx)=>({croId:id,order:idx+1,status:'Available',active:true,addedAt:new Date().toISOString()})),turnEvents:[]};state.rotations.push(rot);closeModal();save('rotation.create',{rotationId:rot.id,count:included.length});toast('Rotation created.','success')}
function addCroToMaster(){if(!requireSM())return;openModal('Add CRO',`<div class="form-grid"><div class="field full"><label class="label">Name *</label><input class="input" id="newCroName" placeholder="CRO name"></div><div class="field full"><label class="label">Code</label><input class="input" id="newCroCode" placeholder="CRO-06"></div></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveNewCro()">Add CRO</button>`,true)}
function saveNewCro(){const name=$('newCroName').value.trim();if(!name){toast('Name required.','error');return}state.cros.push({id:uid('cro'),name,code:$('newCroCode').value.trim(),active:true});closeModal();save('cro.master.add',{name});toast('CRO added.','success')}
function openAddCroToRotation(){if(!requireSM())return;const rot=currentRotation(),available=state.cros.filter(c=>c.active&&!rot.items.some(i=>i.croId===c.id));if(!available.length){toast('No CRO left to add.','warn');return}openModal('Add CRO to Today',`<div class="field full"><label class="label">Select CRO</label><select class="select" id="addTodayCro">${available.map(c=>`<option value="${c.id}">${esc(c.name)} ${esc(c.code||'')}</option>`).join('')}</select></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmAddCroToday()">Add</button>`,true)}
function confirmAddCroToday(){const rot=currentRotation(),id=$('addTodayCro').value;rot.items.push({croId:id,order:rot.items.length+1,status:'Available',active:true,addedAt:new Date().toISOString(),addedBy:role});closeModal();save('rotation.cro.add',{croId:id});toast('CRO added to today.','success')}
function setCroStatus(croId){if(!requireSM())return;const item=rotationItem(currentRotation(),croId);openModal(`${esc(croName(croId))} — Status`,`<div class="field full" style="margin-bottom:14px"><label class="label">Status</label><select class="select" id="croStatus"><option>Available</option><option>Busy</option><option>Washroom</option><option>Tea / Lunch Break</option><option>Not Near Entrance</option><option>Manager Work</option><option>Half Day</option><option>Inactive</option></select></div><div class="field full"><label class="label">Note (optional)</label><input class="input" id="croStatusNote" placeholder="Reason..."></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmCroStatus('${croId}')">Update</button>`,true);$('croStatus').value=item?.status||'Available'}
function confirmCroStatus(croId){const item=rotationItem(currentRotation(),croId);item.status=$('croStatus').value;item.note=$('croStatusNote').value.trim();item.active=!['Half Day','Inactive'].includes(item.status);closeModal();save('cro.status.update',{croId,status:item.status});toast('Status updated.','success')}
function moveCro(croId,dir){if(!requireSM())return;const rot=currentRotation(),arr=rot.items.sort((a,b)=>a.order-b.order),idx=arr.findIndex(i=>i.croId===croId),ni=idx+dir;if(ni<0||ni>=arr.length)return;[arr[idx],arr[ni]]=[arr[ni],arr[idx]];arr.forEach((i,n)=>i.order=n+1);save('rotation.reorder',{croId,dir})}
function removeCroToday(croId){if(!requireSM())return;const rot=currentRotation();if(!confirm('Remove this CRO from today\'s rotation?'))return;rot.items=rot.items.filter(i=>i.croId!==croId).map((i,n)=>({...i,order:n+1}));if(rot.currentCroId===croId)rot.currentCroId=activeRotationItems(rot)[0]?.croId||null;save('rotation.cro.remove',{croId})}
function nextCroAfter(rot,croId){const active=activeRotationItems(rot).sort((a,b)=>a.order-b.order);if(!active.length)return null;const idx=active.findIndex(i=>i.croId===croId);return active[(idx+1+active.length)%active.length]?.croId||active[0].croId}
function firstAvailableCro(rot,skipIds=[]){const active=activeRotationItems(rot).sort((a,b)=>a.order-b.order);return active.find(i=>!skipIds.includes(i.croId)&&['Available','Busy'].includes(i.status))?.croId||active.find(i=>!skipIds.includes(i.croId))?.croId||null}
function advancePointer(rot,fromCroId){rot.currentCroId=nextCroAfter(rot,fromCroId)||rot.currentCroId}
function renderEntry(){const rot=currentRotation();$('view-entry').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>Customer Entry</h1><p>Greeter records customer details and CRO is allocated</p></div><span class="badge navy" style="font-size:14px;padding:6px 14px">Next: ${getQueueNo()}</span></div><div class="grid-2"><div class="card"><div class="card-head"><div><div class="card-title">New Walk-in</div></div></div><div class="card-body">${!rot?'<div class="warn-note" style="margin-bottom:14px">No rotation active — CRO auto-allocation will be skipped.</div>':''}<div class="form-grid"><div class="field"><label class="label">Mobile No. *</label><input class="input" id="custMobile" maxlength="10" placeholder="10 digit mobile" oninput="showCustomerHistory()"></div><div class="field"><label class="label">Customer Name *</label><input class="input" id="custName" placeholder="Full name"></div><div class="field"><label class="label">Visit Type *</label><select class="select" id="visitType"><option>Purchase</option><option>Service</option><option>Complaint</option><option>Enquiry</option><option>Delivery</option><option>Exchange</option></select></div><div class="field"><label class="label">Customer Type</label><select class="select" id="customerType"><option>New</option><option>Repeat</option><option>VIP</option></select></div><div class="field"><label class="label">Product Interest</label><input class="input" id="productInterest" placeholder="Watch / strap / battery"></div><div class="field"><label class="label">Source</label><select class="select" id="source"><option>Walk-in</option><option>Referral</option><option>Phone enquiry</option><option>Repeat customer</option><option>WhatsApp</option></select></div><div class="field"><label class="label">No. of People</label><input class="input" id="peopleCount" type="number" min="1" value="1"></div><div class="field"><label class="label">Priority</label><select class="select" id="priority"><option>Normal</option><option>VIP</option><option>Senior Citizen</option><option>Complaint</option><option>Urgent Service</option></select></div><div class="field full"><label class="label">Purpose / Notes</label><textarea class="textarea" id="purpose" placeholder="What does the customer need?"></textarea></div></div></div><div class="card-foot"><button class="btn ghost" onclick="clearEntryForm()">Clear</button><button class="btn primary" onclick="addCustomer()" style="margin-left:auto">Save & Allocate CRO →</button></div></div><div class="card"><div class="card-head"><div><div class="card-title">Visit History</div><div class="card-sub">Previous visits for this mobile number</div></div></div><div class="card-body" id="historyBox"><div class="empty-state"><p>Enter mobile number to see history</p></div></div></div></div>`}
function showCustomerHistory(){const mobile=$('custMobile')?.value.trim(),box=$('historyBox');if(!box)return;if(mobile.length<4){box.innerHTML='<div class="empty-state"><p>Enter mobile number to see history</p></div>';return}const hist=state.customers.filter(c=>c.mobile===mobile).slice(-6).reverse();box.innerHTML=hist.map(c=>`<div class="hist-item"><strong>${esc(c.queueNo)} &middot; ${fmtDT(c.entryTime)}</strong><div class="mini">Outcome: ${esc(c.outcome||c.status)} &middot; CRO: ${esc(croName(c.assignedCroId))} &middot; ₹${(+c.purchaseAmount||0).toLocaleString('en-IN')}</div><div class="mini">${esc(c.notes||c.purpose||'')}</div></div>`).join('')||'<div class="empty-state"><p>No previous visits found</p></div>'}
function clearEntryForm(){['custMobile','custName','productInterest','purpose'].forEach(id=>$(id).value='');$('peopleCount').value=1;showCustomerHistory()}
function addCustomer(){const mobile=$('custMobile').value.trim(),name=$('custName').value.trim();if(!/^\d{10}$/.test(mobile)){toast('Mobile must be 10 digits.','error');return}if(!name){toast('Customer name required.','error');return}const duplicate=todaysCustomers().find(c=>c.mobile===mobile&&!c.outcome);if(duplicate&&!confirm('This mobile has an open entry today. Continue?'))return;const c={id:uid('cust'),queueNo:getQueueNo(),entryTime:new Date().toISOString(),name,mobile,visitType:$('visitType').value,customerType:$('customerType').value,productInterest:$('productInterest').value.trim(),source:$('source').value,peopleCount:+$('peopleCount').value||1,priority:$('priority').value,purpose:$('purpose').value.trim(),status:'New Entry',assignedCroId:null,expectedCroId:null,attendStart:null,exitTime:null,outcome:null,notes:''};state.customers.push(c);allocateCustomer(c.id);clearEntryForm();save('customer.create',{queueNo:c.queueNo,mobile:c.mobile});toast(`${c.queueNo} added.`,'success');switchView('live')}
function allocateCustomer(customerId){const c=customerById(customerId),rot=currentRotation();if(!c||!rot){if(c)c.status='Waiting';return}let target=rot.priorityCroId||rot.currentCroId||firstAvailableCro(rot);if(!target){c.status='Waiting';return}const item=rotationItem(rot,target);if(item&&['Washroom','Tea / Lunch Break','Not Near Entrance','Manager Work','Half Day','Inactive'].includes(item.status)){openSkipTurn(customerId,target);return}c.expectedCroId=target;c.assignedCroId=target;c.allocatedTime=new Date().toISOString();c.status='Allocated';if(rot.priorityCroId===target)rot.priorityCroId=null;advancePointer(rot,target)}
function openSkipTurn(customerId,expectedCroId){const rot=currentRotation(),c=customerById(customerId),actual=firstAvailableCro(rot,[expectedCroId])||expectedCroId;openModal('Record Skip Reason',`<div class="danger-note" style="margin-bottom:14px">Expected CRO <b>${esc(croName(expectedCroId))}</b> is unavailable for ${esc(c.queueNo)}.</div><div class="form-grid"><div class="field full"><label class="label">Skip Reason *</label><select class="select" id="skipReason"><option>Washroom</option><option>Tea / Lunch Break</option><option>Half Day</option><option>Busy With Existing Customer</option><option>Not Near Entrance</option><option>On Phone Call</option><option>Service Desk Work</option><option>Stock / Billing Work</option><option>Customer Follow-up</option><option>Manager Assigned Work</option><option>Refused Turn</option><option>Other</option></select></div><div class="field full"><label class="label">Allocate Customer To</label><select class="select" id="actualCro">${activeRotationItems(rot).map(i=>`<option value="${i.croId}" ${i.croId===actual?'selected':''}>${esc(croName(i.croId))}</option>`).join('')}</select></div><div class="field full"><label class="label">Note (optional)</label><input class="input" id="skipNote" placeholder="Additional detail..."></div><div class="field full"><label class="switch"><input type="checkbox" id="nextOpp" ${role==='Greeter'?'disabled':''}><div class="switch-track"></div><div class="switch-thumb"></div></label>&nbsp; Give skipped CRO next opportunity ${role==='Greeter'?'<span class="badge gray">SM right required</span>':''}</div></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmSkip('${customerId}','${expectedCroId}')">Confirm &amp; Allocate</button>`)}
function confirmSkip(customerId,expectedCroId){const rot=currentRotation(),c=customerById(customerId),reason=$('skipReason').value,actualCroId=$('actualCro').value,nextOpportunity=$('nextOpp').checked&&role!=='Greeter';c.expectedCroId=expectedCroId;c.assignedCroId=actualCroId;c.allocatedTime=new Date().toISOString();c.status='Allocated';rot.turnEvents.push({id:uid('turn'),at:new Date().toISOString(),queueNo:c.queueNo,expectedCroId,actualCroId,skipped:true,reason,note:$('skipNote').value.trim(),nextOpportunity,by:role});if(nextOpportunity)rot.priorityCroId=expectedCroId;else advancePointer(rot,actualCroId);if(reason==='Half Day'){const item=rotationItem(rot,expectedCroId);if(item){item.status='Half Day';item.active=false}}closeModal();save('turn.skip',{queueNo:c.queueNo,expectedCroId,actualCroId,reason,nextOpportunity});toast('Skip recorded.','success')}
function renderLive(){const list=todaysCustomers().sort((a,b)=>new Date(b.entryTime)-new Date(a.entryTime)),open=list.filter(c=>c.status!=='Closed'),closed=list.filter(c=>c.status==='Closed');$('view-live').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>Live Queue</h1><p>${open.length} active &middot; ${closed.length} closed today</p></div><button class="btn primary" onclick="switchView('entry')">+ Add Walk-in</button></div>${open.length?`<div class="section-title">Active</div><div class="grid-auto" style="margin-bottom:24px">${open.map(queueCard).join('')}</div>`:'<div class="empty-state" style="padding:30px 0"><p>No active customers</p></div>'}${closed.length?`<div class="section-title">Closed Today</div><div class="grid-auto">${closed.map(queueCard).join('')}</div>`:''}`}
function statusConfig(c){if(c.status==='Closed')return{cls:'gray',dot:'#9aaab8'};if(c.status==='In Discussion'||c.status==='Billing / Service Desk')return{cls:'green',dot:'#0ea371'};if(c.status==='Allocated')return{cls:'blue',dot:'#2563eb'};return{cls:'orange',dot:'#d97706'}}
function queueCard(c){const wait=minsBetween(c.entryTime,c.attendStart||new Date().toISOString()),sc=statusConfig(c),isOverdue=wait>=state.settings.waitAlertMins&&!c.attendStart;return`<article class="q-card ${c.status==='Closed'?'is-closed':''}"><div class="q-card-top"><div><div class="q-num">${esc(c.queueNo)}</div><div class="q-name">${esc(c.name)}</div><div class="q-meta">${esc(c.mobile)} &middot; ${esc(c.visitType)}</div></div><span class="badge ${sc.cls}">${esc(c.status)}</span></div><div class="q-tags"><span class="badge gray">Entry ${fmtTime(c.entryTime)}</span><span class="badge ${isOverdue?'orange':'gray'}">Wait ${wait}m</span>${c.assignedCroId?`<span class="badge navy">${esc(croName(c.assignedCroId))}</span>`:''} ${c.priority!=='Normal'?`<span class="badge gold">${esc(c.priority)}</span>`:''}</div>${c.productInterest||c.purpose?`<div class="q-purpose">${esc(c.productInterest||c.purpose)}</div>`:''}<div class="q-actions"><button class="btn xs ghost" onclick="openCustomer('${c.id}')">Details</button><button class="btn xs" onclick="startAttend('${c.id}')" ${c.attendStart?'disabled':''}>Start</button><button class="btn xs" onclick="markExit('${c.id}')" ${c.exitTime?'disabled':''}>Exit</button><button class="btn xs primary" onclick="openCloseLead('${c.id}')" ${c.status==='Closed'?'disabled':''}>Close</button>${c.status!=='Closed'?`<button class="btn xs ghost" onclick="manualReassign('${c.id}')">Reassign</button>`:''}</div></article>`}
function startAttend(id){const c=customerById(id);if(!c.assignedCroId){toast('Assign CRO first.','error');return}c.attendStart=new Date().toISOString();c.status='In Discussion';save('customer.attend.start',{queueNo:c.queueNo});toast('Attendance started.','success')}
function markExit(id){const c=customerById(id);c.exitTime=new Date().toISOString();if(c.status!=='Closed')c.status='Awaiting Closure';save('customer.exit',{queueNo:c.queueNo});toast('Exit recorded.','warn')}
function openCustomer(id){const c=customerById(id);openModal(`${esc(c.queueNo)} — ${esc(c.name)}`,`<div class="grid-2" style="gap:12px"><div class="report-card"><h4>Customer</h4><div class="report-row"><span class="rk">Mobile</span><span class="rv mono">${esc(c.mobile)}</span></div><div class="report-row"><span class="rk">Visit Type</span><span class="rv">${esc(c.visitType)}</span></div><div class="report-row"><span class="rk">Purpose</span><span class="rv">${esc(c.purpose||'—')}</span></div><div class="report-row"><span class="rk">Product</span><span class="rv">${esc(c.productInterest||'—')}</span></div><div class="report-row"><span class="rk">Source</span><span class="rv">${esc(c.source)}</span></div></div><div class="report-card"><h4>Timeline</h4><div class="report-row"><span class="rk">Entry</span><span class="rv">${fmtDT(c.entryTime)}</span></div><div class="report-row"><span class="rk">Allocated</span><span class="rv">${fmtDT(c.allocatedTime)}</span></div><div class="report-row"><span class="rk">Attend</span><span class="rv">${fmtDT(c.attendStart)}</span></div><div class="report-row"><span class="rk">Exit</span><span class="rv">${fmtDT(c.exitTime)}</span></div><div class="report-row"><span class="rk">Closed</span><span class="rv">${fmtDT(c.closedAt)}</span></div></div></div><div class="report-card" style="margin-top:12px"><h4>Outcome</h4><div class="report-row"><span class="rk">Status</span><span class="rv">${esc(c.status)}</span></div><div class="report-row"><span class="rk">Outcome</span><span class="rv">${esc(c.outcome||'—')}</span></div><div class="report-row"><span class="rk">CRO</span><span class="rv">${esc(croName(c.assignedCroId))}</span></div><div class="report-row"><span class="rk">Notes</span><span class="rv">${esc(c.notes||'—')}</span></div></div>`,`<button class="btn ghost" onclick="closeModal()">Close</button>`)}
function manualReassign(id){if(role==='CRO'){toast('CRO cannot reassign.','error');return}const c=customerById(id),rot=currentRotation();openModal('Reassign CRO',`<div class="field full" style="margin-bottom:12px"><label class="label">Select CRO</label><select class="select" id="reassignCro">${(rot?activeRotationItems(rot):state.cros.filter(c=>c.active).map(c=>({croId:c.id}))).map(i=>`<option value="${i.croId}" ${c.assignedCroId===i.croId?'selected':''}>${esc(croName(i.croId))}</option>`).join('')}</select></div><div class="field full"><label class="label">Reason *</label><input class="input" id="reassignReason" placeholder="Mandatory for audit"></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmReassign('${id}')">Reassign</button>`,true)}
function confirmReassign(id){const c=customerById(id),reason=$('reassignReason').value.trim();if(!reason){toast('Reason required.','error');return}const old=c.assignedCroId;c.assignedCroId=$('reassignCro').value;c.status='Allocated';closeModal();save('customer.reassign',{queueNo:c.queueNo,old,new:c.assignedCroId,reason});toast('CRO reassigned.','success')}
function openCloseLead(id){const c=customerById(id);if(role==='Greeter'&&!state.settings.allowGreeterClose){toast('Greeter cannot close leads (setting disabled).','error');return}openModal('Close Lead — '+esc(c.queueNo),`<div class="form-grid"><div class="field"><label class="label">Outcome *</label><select class="select" id="closeOutcome" onchange="renderOutcomeFields()"><option>Purchase</option><option>Service</option><option>Non Purchase</option></select></div><div class="field"><label class="label">Follow-up Required?</label><select class="select" id="fuReq" onchange="renderOutcomeFields()"><option>No</option><option>Yes</option></select></div><div class="field full" id="outcomeFields"></div><div class="field full"><label class="label">Closure Notes</label><textarea class="textarea" id="closeNotes"></textarea></div></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmCloseLead('${id}')">Close Lead</button>`);if(c.outcome)$('closeOutcome').value=c.outcome;renderOutcomeFields()}
function renderOutcomeFields(){const out=$('closeOutcome').value,fu=$('fuReq').value;let html='';if(out==='Purchase')html=`<div class="form-grid"><div class="field"><label class="label">Bill No. ${state.settings.requireBillForPurchase?'*':''}</label><input class="input" id="billNo"></div><div class="field"><label class="label">Amount *</label><input class="input" id="purchaseAmount" type="number" min="0"></div><div class="field"><label class="label">Category</label><input class="input" id="purchaseCategory" placeholder="Watch"></div><div class="field"><label class="label">Payment Mode</label><select class="select" id="paymentMode"><option>Cash</option><option>Card</option><option>UPI</option><option>Mixed</option></select></div></div>`;if(out==='Service')html=`<div class="form-grid"><div class="field"><label class="label">Job Card No. ${state.settings.requireJobForService?'*':''}</label><input class="input" id="jobCardNo"></div><div class="field"><label class="label">Service Type</label><select class="select" id="serviceType"><option>Battery</option><option>Repair</option><option>Strap</option><option>Polishing</option><option>Warranty</option><option>Other</option></select></div><div class="field"><label class="label">Expected Delivery</label><input class="input" id="deliveryDate" type="date"></div><div class="field"><label class="label">Advance</label><input class="input" id="advance" type="number" min="0"></div></div>`;if(out==='Non Purchase')html=`<div class="form-grid"><div class="field full"><label class="label">Reason *</label><select class="select" id="lostReason"><option>Price Issue</option><option>Stock Not Available</option><option>Just Browsing</option><option>Wanted Discount</option><option>Need Family Approval</option><option>Competitor Comparison</option><option>Staff Handling Issue</option><option>Waiting Time Too High</option><option>Other</option></select></div><div class="field"><label class="label">Estimated Lost Value</label><input class="input" id="lostValue" type="number" min="0"></div></div>`;if(fu==='Yes')html+=`<div class="form-grid" style="margin-top:4px"><div class="field"><label class="label">Follow-up Date *</label><input class="input" id="followDate" type="date"></div><div class="field"><label class="label">Mode</label><select class="select" id="followMode"><option>Phone Call</option><option>WhatsApp</option><option>In Store</option><option>SMS</option></select></div><div class="field full"><label class="label">Follow-up Notes</label><input class="input" id="followNotes" placeholder="What to follow up about..."></div></div>`;$('outcomeFields').innerHTML=html}
function confirmCloseLead(id){const c=customerById(id),out=$('closeOutcome').value,fu=$('fuReq').value==='Yes';if(out==='Purchase'){const bill=$('billNo').value.trim(),amt=+$('purchaseAmount').value;if(state.settings.requireBillForPurchase&&!bill){toast('Bill number required.','error');return}if(!amt){toast('Purchase amount required.','error');return}Object.assign(c,{billNo:bill,purchaseAmount:amt,purchaseCategory:$('purchaseCategory').value.trim(),paymentMode:$('paymentMode').value})}if(out==='Service'){const job=$('jobCardNo').value.trim();if(state.settings.requireJobForService&&!job){toast('Job card required.','error');return}Object.assign(c,{jobCardNo:job,serviceType:$('serviceType').value,deliveryDate:$('deliveryDate').value,advance:+$('advance').value||0})}if(out==='Non Purchase'){if(!$('lostReason').value){toast('Reason required.','error');return}Object.assign(c,{lostReason:$('lostReason').value,lostValue:+$('lostValue').value||0})}if(fu){const d=$('followDate').value;if(!d){toast('Follow-up date required.','error');return}state.followups.push({id:uid('fu'),customerId:c.id,queueNo:c.queueNo,customerName:c.name,mobile:c.mobile,croId:c.assignedCroId,dueDate:d,mode:$('followMode').value,notes:$('followNotes').value.trim(),status:'Pending',createdAt:new Date().toISOString()})}c.outcome=out;c.notes=$('closeNotes').value.trim();c.closedAt=new Date().toISOString();c.closedBy=role;c.status='Closed';if(!c.exitTime)c.exitTime=new Date().toISOString();closeModal();save('lead.close',{queueNo:c.queueNo,outcome:out,followup:fu});toast('Lead closed.','success')}
function renderFollowups(){const list=state.followups.slice().sort((a,b)=>a.dueDate.localeCompare(b.dueDate)),pending=list.filter(f=>f.status==='Pending'),done=list.filter(f=>f.status!=='Pending');$('view-followups').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>Follow-ups</h1><p>${pending.length} pending &middot; ${done.length} closed</p></div></div><div class="card"><div class="card-head"><div><div class="card-title">Pending Follow-ups</div></div></div><div class="card-body" style="padding:0">${pending.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Due</th><th>Customer</th><th>Mobile</th><th>CRO</th><th>Mode</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${pending.map(f=>`<tr><td><b style="color:${f.dueDate<todayISO()?'var(--red)':'inherit'}">${esc(f.dueDate)}</b></td><td><b>${esc(f.customerName)}</b><div class="sub mono">${esc(f.queueNo)}</div></td><td class="mono">${esc(f.mobile)}</td><td>${esc(croName(f.croId))}</td><td><span class="badge gray">${esc(f.mode)}</span></td><td style="max-width:160px;font-size:12px">${esc(f.notes||'—')}</td><td><div style="display:flex;gap:5px"><button class="btn xs" style="color:var(--green);border-color:#a7f3d0" onclick="updateFollowup('${f.id}','Done')">Done</button><button class="btn xs" style="color:var(--blue);border-color:#bfdbfe" onclick="updateFollowup('${f.id}','Converted')">Converted</button><button class="btn xs" style="color:var(--red);border-color:#fca5a5" onclick="updateFollowup('${f.id}','Lost')">Lost</button></div></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty-state"><p>No pending follow-ups</p></div>'}</div></div>${done.length?`<div class="card" style="margin-top:16px"><div class="card-head"><div><div class="card-title">Completed Follow-ups</div></div></div><div class="card-body" style="padding:0"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Due</th><th>Customer</th><th>CRO</th><th>Mode</th><th>Status</th></tr></thead><tbody>${done.map(f=>`<tr><td>${esc(f.dueDate)}</td><td><b>${esc(f.customerName)}</b><div class="sub mono">${esc(f.queueNo)}</div></td><td>${esc(croName(f.croId))}</td><td>${esc(f.mode)}</td><td><span class="badge ${f.status==='Converted'?'green':f.status==='Lost'?'red':'gray'}">${esc(f.status)}</span></td></tr>`).join('')}</tbody></table></div></div></div>`:''}`}
function updateFollowup(id,status){const f=state.followups.find(x=>x.id===id);f.status=status;f.closedAt=new Date().toISOString();f.closedBy=role;save('followup.update',{queueNo:f.queueNo,status});toast('Follow-up updated.','success')}
function renderReports(){const daily=calcStats(),weekly=rangeStats(7),monthly=rangeStats(31);$('view-reports').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>Reports</h1><p>Daily, weekly and monthly performance</p></div><div class="page-header-actions"><button class="btn" onclick="window.print()">Print</button><button class="btn primary" onclick="exportCSV()">Export CSV</button></div></div><div class="grid-3" style="margin-bottom:16px">${reportCard('Today',daily)}${reportCard('Last 7 Days',weekly)}${reportCard('Last 31 Days',monthly)}</div><div class="grid-2" style="margin-bottom:16px"><div class="card"><div class="card-head"><div><div class="card-title">CRO Performance</div><div class="card-sub">Today</div></div></div><div class="card-body" style="padding:0">${croPerformanceTable()}</div></div><div class="card"><div class="card-head"><div><div class="card-title">Non-Purchase Reasons</div><div class="card-sub">Lost sale analysis</div></div></div><div class="card-body">${lostReasonReport()}</div></div></div><div class="card"><div class="card-head"><div><div class="card-title">Audit Trail</div><div class="card-sub">Recent operations</div></div></div><div class="card-body" style="max-height:400px;overflow-y:auto">${state.audit.slice(0,80).map(a=>`<div class="audit-item"><span class="audit-time">${fmtDT(a.at)}</span><div><div class="audit-action">${esc(a.action)}</div><div class="audit-detail">${esc(JSON.stringify(a.details||{}))}</div></div><span class="badge gray">${esc(a.role)}</span></div>`).join('')||'<div class="empty-state"><p>No audit records yet</p></div>'}</div></div>`}
function rangeStats(days){const since=new Date();since.setDate(since.getDate()-days+1);return calcStats(state.customers.filter(c=>new Date(c.entryTime)>=since))}
function reportCard(title,s){return`<div class="report-card"><h4>${title}</h4><div class="report-row"><span class="rk">Walk-ins</span><span class="rv">${s.total}</span></div><div class="report-row"><span class="rk">Purchase / Service / Non</span><span class="rv">${s.pur} / ${s.svc} / ${s.non}</span></div><div class="report-row"><span class="rk">Sales</span><span class="rv">₹${s.sales.toLocaleString('en-IN')}</span></div><div class="report-row"><span class="rk">Conversion</span><span class="rv">${s.conv}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,s.conv)}%"></div></div></div>`}
function croPerformanceTable(){const rows=state.cros.filter(c=>c.active).map(c=>{const list=todaysCustomers().filter(x=>x.assignedCroId===c.id),pur=list.filter(x=>x.outcome==='Purchase'),rot=currentRotation(),skips=(rot?.turnEvents||[]).filter(e=>e.expectedCroId===c.id).length;return{name:c.name,total:list.length,pur:pur.length,sales:pur.reduce((s,x)=>s+(+x.purchaseAmount||0),0),conv:list.length?Math.round(pur.length/list.length*100):0,skips}});return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>CRO</th><th>Assigned</th><th>Purchases</th><th>Conversion</th><th>Sales</th><th>Skipped</th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td>${r.total}</td><td>${r.pur}</td><td>${r.conv}%</td><td>₹${r.sales.toLocaleString('en-IN')}</td><td>${r.skips>0?`<span class="badge orange">${r.skips}</span>`:r.skips}</td></tr>`).join('')}</tbody></table></div>`}
function lostReasonReport(){const rows={};state.customers.filter(c=>c.outcome==='Non Purchase').forEach(c=>rows[c.lostReason||'Not specified']=(rows[c.lostReason||'Not specified']||0)+1);const max=Math.max(1,...Object.values(rows)),items=Object.entries(rows).sort((a,b)=>b[1]-a[1]);if(!items.length)return'<div class="empty-state"><p>No non-purchase cases yet</p></div>';return items.map(([k,v])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12.5px;font-weight:500;color:var(--ink2)">${esc(k)}</span><span style="font-size:12px;font-weight:700;color:var(--ink)">${v}</span></div><div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%;background:var(--gold)"></div></div></div>`).join('')}
function renderSettings(){$('view-settings').innerHTML=`<div class="page-header"><div class="page-header-left"><h1>Settings</h1><p>System configuration, data management and CRO master list</p></div></div><div class="grid-2" style="margin-bottom:16px"><div class="card"><div class="card-head"><div><div class="card-title">Store & Queue Settings</div></div></div><div class="card-body">${settingRows()}</div></div><div class="card"><div class="card-head"><div><div class="card-title">Data & Backup</div></div></div><div class="card-body"><div class="toggle-row"><div class="toggle-info"><strong>Storage Key</strong><span class="mono" style="font-size:11px">${STORE_KEY}</span></div></div><div class="toggle-row"><div class="toggle-info"><strong>Records</strong><span>${state.customers.length} customers, ${state.followups.length} follow-ups, ${state.audit.length} audit logs</span></div></div><div class="toggle-row"><div class="toggle-info"><strong>Last Backup</strong><span>${state.lastBackup?fmtDT(state.lastBackup):'Never'}</span></div></div></div><div class="card-foot"><button class="btn green" onclick="backupData()">Download Backup</button><button class="btn gold" onclick="$('restoreInput').click()">Restore</button><button class="btn" style="color:var(--red);border-color:#fca5a5;margin-left:auto" onclick="resetDemo()">Reset All</button></div></div></div><div class="card"><div class="card-head"><div><div class="card-title">CRO Master</div><div class="card-sub">Active CROs available for daily rotation</div></div><button class="btn primary" onclick="addCroToMaster()">Add CRO</button></div><div class="card-body" style="padding:0">${croMasterTable()}</div></div>`}
function settingRows(){const s=state.settings,rows=[['storeName','Store Name','text'],['queuePrefix','Queue Number Prefix','text'],['waitAlertMins','Waiting Alert (minutes)','number'],['autoAllocate','Auto-allocate CRO by rotation','bool'],['requireBillForPurchase','Bill No. required for Purchase','bool'],['requireJobForService','Job Card required for Service','bool'],['allowGreeterClose','Allow Greeter to close leads','bool'],['smCanGiveNextOpportunity','SM can give next opportunity','bool'],['lockEditsAfterEOD','Lock edits after EOD','bool']];return rows.map(([key,label,type])=>`<div class="toggle-row"><div class="toggle-info"><strong>${label}</strong>${type!=='bool'?`<span>${esc(String(s[key]))}</span>`:''}</div>${type==='bool'?`<label class="switch"><input type="checkbox" ${s[key]?'checked':''} onchange="updateSetting('${key}',this.checked)"><div class="switch-track"></div><div class="switch-thumb"></div></label>`:`<input class="input setting-input" type="${type}" value="${esc(s[key])}" onchange="updateSetting('${key}',this.value)">`}</div>`).join('')}
function updateSetting(k,v){if(!requireSM())return;if(k==='waitAlertMins')v=+v||10;state.settings[k]=v;save('settings.update',{key:k,value:v})}
function croMasterTable(){return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Name</th><th>Code</th><th>Status</th><th>Actions</th></tr></thead><tbody>${state.cros.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td class="mono" style="font-size:12px">${esc(c.code||'—')}</td><td><span class="badge ${c.active?'green':'red'}">${c.active?'Active':'Inactive'}</span></td><td><div style="display:flex;gap:5px"><button class="btn sm" onclick="editCro('${c.id}')">Edit</button><button class="btn sm" style="color:${c.active?'var(--red)':'var(--green)'};border-color:${c.active?'#fca5a5':'#a7f3d0'}" onclick="toggleCro('${c.id}')">${c.active?'Deactivate':'Activate'}</button></div></td></tr>`).join('')}</tbody></table></div>`}
function editCro(id){const c=state.cros.find(x=>x.id===id);openModal('Edit CRO',`<div class="field full" style="margin-bottom:12px"><label class="label">Name</label><input class="input" id="editCroName" value="${esc(c.name)}"></div><div class="field full"><label class="label">Code</label><input class="input" id="editCroCode" value="${esc(c.code||'')}"></div>`,`<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="confirmEditCro('${id}')">Save</button>`,true)}
function confirmEditCro(id){const c=state.cros.find(x=>x.id===id);c.name=$('editCroName').value.trim()||c.name;c.code=$('editCroCode').value.trim();closeModal();save('cro.edit',{id});toast('CRO updated.','success')}
function toggleCro(id){if(!requireSM())return;const c=state.cros.find(x=>x.id===id);c.active=!c.active;save('cro.toggle',{id,active:c.active});toast(`${c.name} ${c.active?'activated':'deactivated'}.`)}
function backupData(){state.lastBackup=new Date().toISOString();localStorage.setItem(STORE_KEY,JSON.stringify(state));const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`qms-backup-${todayISO()}.json`;a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded.','success');renderAll()}
function restoreData(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(!data.settings||!Array.isArray(data.customers))throw new Error('Invalid');state=data;localStorage.setItem(STORE_KEY,JSON.stringify(state));load();renderAll();toast('Backup restored.','success')}catch(e){toast('Invalid backup file.','error')}};r.readAsText(file)}
function resetDemo(){if(!requireSM())return;if(!confirm('Delete all QMS data in this browser? This cannot be undone.'))return;state=initialState();localStorage.setItem(STORE_KEY,JSON.stringify(state));load();renderAll();toast('System reset.','warn')}
function closeEOD(){if(!requireSM())return;const rot=currentRotation(),open=todaysCustomers().filter(c=>c.status!=='Closed');if(open.length&&!confirm(`${open.length} lead(s) still open. Close EOD anyway?`))return;rot.status='Closed';rot.closedAt=new Date().toISOString();rot.closedBy=role;save('eod.close',{date:todayISO(),open:open.length});toast('EOD closed.','success')}
function exportCSV(){const headers=['Date','Queue No','Name','Mobile','Visit Type','Entry','Allocated CRO','Attend Start','Exit','Outcome','Amount','Lost Reason','Status'],rows=state.customers.map(c=>[(c.entryTime||'').slice(0,10),c.queueNo,c.name,c.mobile,c.visitType,fmtDT(c.entryTime),croName(c.assignedCroId),fmtDT(c.attendStart),fmtDT(c.exitTime),c.outcome||'',c.purchaseAmount||'',c.lostReason||'',c.status]),csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n'),blob=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`qms-report-${todayISO()}.csv`;a.click();URL.revokeObjectURL(a.href);toast('CSV exported.','success')}
load();tick();renderAll();
</script>
</body>
</html>
