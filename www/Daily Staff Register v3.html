<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saagar Traders — Daily Staff Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS
───────────────────────────────────────── */
:root {
  /* Brand */
  --ink:        #0a0a0f;
  --ink-2:      #1c1c28;
  --ink-3:      #2e2e40;
  --muted:      #6b6b80;
  --subtle:     #9898a8;
  --border:     #e4e4ef;
  --border-2:   #f0f0f8;
  --surface:    #fafafa;
  --white:      #ffffff;

  /* Accent — deep navy-gold (watch store) */
  --accent:     #1a1a3e;
  --accent-2:   #252550;
  --accent-3:   #31317a;
  --gold:       #c9a84c;
  --gold-lt:    #e8c97e;
  --gold-pale:  #fdf6e3;

  /* Semantic */
  --green:      #16a34a;
  --green-pale: #f0fdf4;
  --green-mid:  #86efac;
  --amber:      #d97706;
  --amber-pale: #fffbeb;
  --amber-mid:  #fcd34d;
  --red:        #dc2626;
  --red-pale:   #fef2f2;
  --red-mid:    #fca5a5;
  --sky:        #0284c7;
  --sky-pale:   #f0f9ff;

  /* Radius */
  --r-xs: 6px;
  --r-sm: 10px;
  --r:    14px;
  --r-lg: 20px;
  --r-xl: 28px;

  /* Shadow */
  --sh-xs: 0 1px 3px rgba(10,10,31,.06), 0 1px 2px rgba(10,10,31,.04);
  --sh-sm: 0 2px 8px rgba(10,10,31,.08), 0 1px 3px rgba(10,10,31,.05);
  --sh-md: 0 8px 24px rgba(10,10,31,.10), 0 2px 6px rgba(10,10,31,.06);
  --sh-lg: 0 20px 48px rgba(10,10,31,.14), 0 4px 12px rgba(10,10,31,.08);
}

/* ─────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; height: 100%; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
input, select, textarea, button { font-family: inherit; }
img { display: block; }

/* ─────────────────────────────────────────
   SCREENS
───────────────────────────────────────── */
.screen { display: none; min-height: 100dvh; flex-direction: column; }
.screen.active { display: flex; }

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#scr-login {
  background: var(--accent);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(49,49,122,.5) 0%, transparent 60%);
  align-items: center;
  justify-content: center;
  padding: 20px;
  min-height: 100dvh;
}
.login-wrap {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.login-brand {
  text-align: center;
  padding: 0 0 32px;
}
.login-mark {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(201,168,76,.35);
}
.login-mark svg { width: 32px; height: 32px; }
.login-brand h1 {
  font-size: 22px; font-weight: 700; color: var(--white);
  letter-spacing: -.3px; line-height: 1.2;
}
.login-brand .brand-sub {
  font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px; font-weight: 400;
}

.login-card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  box-shadow: var(--sh-lg);
}
.login-date-pill {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 99px;
  padding: 7px 16px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,.7);
  margin-bottom: 22px;
}
.login-date-pill span { color: var(--gold); font-weight: 600; }

/* Role switcher */
.role-sw {
  display: grid; grid-template-columns: 1fr 1fr;
  background: rgba(0,0,0,.25);
  border-radius: var(--r-sm);
  padding: 3px;
  gap: 3px;
  margin-bottom: 22px;
}
.role-sw-btn {
  padding: 10px 6px;
  border: none; background: transparent; cursor: pointer;
  border-radius: 8px;
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,.45);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.role-sw-btn.active {
  background: rgba(255,255,255,.14);
  color: var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.role-sw-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.lform { display: none; }
.lform.active { display: block; }

/* Form controls — login */
.lf-group { margin-bottom: 14px; }
.lf-lbl {
  display: block; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,.45);
  text-transform: uppercase; letter-spacing: .6px;
  margin-bottom: 6px;
}
.lf-inp {
  width: 100%; padding: 13px 15px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r-sm);
  font-size: 15px; color: var(--white);
  outline: none; transition: border-color .18s, background .18s;
  -webkit-appearance: none;
}
.lf-inp::placeholder { color: rgba(255,255,255,.25); }
.lf-inp:focus {
  border-color: var(--gold);
  background: rgba(255,255,255,.12);
}
.lf-inp.err { border-color: var(--red-mid); }
.lf-inp option { background: var(--accent-2); color: var(--white); }

.btn-login {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
  color: var(--accent); border: none; border-radius: var(--r-sm);
  font-size: 15px; font-weight: 700; cursor: pointer;
  margin-top: 6px;
  box-shadow: 0 4px 20px rgba(201,168,76,.4);
  transition: opacity .18s, transform .12s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-login:active { opacity: .88; transform: scale(.98); }
.btn-login svg { width: 16px; height: 16px; }
.login-err {
  font-size: 12px; color: #fca5a5; text-align: center;
  margin-top: 10px; min-height: 18px;
}

/* ══════════════════════════════════════
   APP SHELL (Staff + SM)
══════════════════════════════════════ */
.app-header {
  display: flex; align-items: center;
  padding: 0 16px;
  height: 56px;
  position: sticky; top: 0; z-index: 200;
  flex-shrink: 0;
}
.staff-header { background: var(--accent); }
.sm-header {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
}
.app-header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; background: rgba(255,255,255,.08);
}

.hdr-brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.hdr-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.hdr-dot svg { width: 14px; height: 14px; }
.hdr-name {
  font-size: 14px; font-weight: 600; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hdr-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }

.hdr-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.hdr-chip {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.75);
  padding: 4px 11px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.hdr-clock {
  font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--gold); font-weight: 500;
  letter-spacing: .05em;
}
.hdr-btn-exit {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.6);
  padding: 6px 12px; border-radius: var(--r-xs);
  font-size: 12px; font-weight: 600; cursor: pointer;
  white-space: nowrap; transition: all .15s;
}
.hdr-btn-exit:hover { background: rgba(255,255,255,.14); color: var(--white); }

/* ── TAB BAR ── */
.tabbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; flex-shrink: 0;
}
.tabbar::-webkit-scrollbar { display: none; }
.tabbar-inner {
  display: flex; padding: 0 12px;
  white-space: nowrap; min-width: max-content;
}
.tab-btn {
  padding: 0 14px; height: 44px;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  border: none; background: transparent;
  border-bottom: 2px solid transparent;
  transition: all .16s; white-space: nowrap;
  position: relative;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.tab-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); display: none; flex-shrink: 0;
}
.tab-btn.done .tab-dot { display: block; }

/* ── PROGRESS BAR ── */
.progress-wrap {
  background: var(--white);
  padding: 8px 16px 10px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border-2);
  flex-shrink: 0;
}
.progress-track {
  flex: 1; height: 3px;
  background: var(--border);
  border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1);
}
.progress-label {
  font-size: 11px; font-weight: 600; color: var(--subtle);
  white-space: nowrap; font-variant-numeric: tabular-nums;
}

/* ── CONTENT AREA ── */
.content-area {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  background: var(--surface);
}
.tsec { display: none; }
.tsec.active { display: block; }

/* ─────────────────────────────────────────
   DESIGN SYSTEM COMPONENTS
───────────────────────────────────────── */

/* Card */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh-xs);
  padding: 18px;
  margin-bottom: 12px;
}
.card-hdr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600; color: var(--ink);
}
.card-icon {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ci-navy   { background: rgba(26,26,62,.08); color: var(--accent); }
.ci-gold   { background: var(--gold-pale); color: var(--gold); }
.ci-green  { background: var(--green-pale); color: var(--green); }
.ci-amber  { background: var(--amber-pale); color: var(--amber); }
.ci-red    { background: var(--red-pale); color: var(--red); }
.ci-sky    { background: var(--sky-pale); color: var(--sky); }
.card-icon svg { width: 15px; height: 15px; }

/* Info rows */
.info-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-2);
  font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--muted); font-weight: 400; }
.info-val { font-weight: 600; color: var(--ink); text-align: right; }

/* Form */
.fgrp { margin-bottom: 13px; }
.flbl {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 6px;
}
.req { color: var(--red); }
.finp {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 14px; color: var(--ink);
  background: var(--white); outline: none;
  -webkit-appearance: none;
  transition: border-color .16s, box-shadow .16s;
}
.finp:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,26,62,.07);
}
.finp:disabled { background: var(--surface); color: var(--subtle); }
.finp.err { border-color: var(--red); }
.fgrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
textarea.finp { resize: vertical; min-height: 72px; }
.finp option { background: var(--white); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 16px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600;
  border: none; cursor: pointer;
  transition: all .15s; line-height: 1;
  white-space: nowrap;
}
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-primary { background: var(--accent); color: var(--white); }
.btn-primary:hover { background: var(--accent-2); }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-lt)); color: var(--accent); }
.btn-green { background: var(--green); color: var(--white); }
.btn-green:hover { background: #15803d; }
.btn-red { background: var(--red); color: var(--white); }
.btn-amber { background: var(--amber); color: var(--white); }
.btn-outline {
  background: var(--white); color: var(--ink-3);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost {
  background: transparent; color: var(--muted);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { color: var(--red); border-color: var(--red); }
.btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 7px; }
.btn-lg { width: 100%; padding: 14px 20px; font-size: 14px; border-radius: var(--r-sm); }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* Summary bar */
.summary-bar {
  background: var(--accent);
  background-image: radial-gradient(ellipse 80% 100% at 100% 50%, rgba(201,168,76,.15) 0%, transparent 70%);
  color: var(--white);
  padding: 16px 18px;
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
  box-shadow: var(--sh-sm);
}
.summary-bar-lbl { font-size: 12px; color: rgba(255,255,255,.55); font-weight: 500; }
.summary-bar-val { font-size: 22px; font-weight: 700; margin-top: 2px; letter-spacing: -.5px; }
.summary-bar-val .sub { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.6); margin-left: 6px; }

/* Status badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.badge-green { background: var(--green-pale); color: var(--green); }
.badge-amber { background: var(--amber-pale); color: var(--amber); }
.badge-red   { background: var(--red-pale); color: var(--red); }
.badge-navy  { background: rgba(26,26,62,.08); color: var(--accent); }
.badge-gold  { background: var(--gold-pale); color: #92680a; }
.badge svg   { width: 10px; height: 10px; }

/* Stock grid */
.sgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
.stotal {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px; margin-top: 8px;
}
.stotal-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
.stotal-val { font-size: 20px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

/* Group header */
.group-hdr {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px;
  padding: 10px 0 6px; margin-top: 4px;
  border-bottom: 1px solid var(--border-2);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* In/Out status */
.io-status {
  border-radius: var(--r);
  padding: 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
  border: 1px solid;
}
.io-in  { background: var(--green-pale); border-color: var(--green-mid); }
.io-out { background: var(--amber-pale); border-color: var(--amber-mid); }
.io-pulse {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0; position: relative;
}
.io-in .io-pulse { background: var(--green); box-shadow: 0 0 0 4px rgba(22,163,74,.2); }
.io-out .io-pulse { background: var(--amber); box-shadow: 0 0 0 4px rgba(217,119,6,.2); }
.io-status-body { flex: 1; }
.io-status-label { font-size: 14px; font-weight: 600; }
.io-in  .io-status-label { color: var(--green); }
.io-out .io-status-label { color: var(--amber); }
.io-status-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.log-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-2);
  font-size: 13px;
}
.log-item:last-child { border-bottom: none; }
.log-badge {
  padding: 2px 9px; border-radius: 99px;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.log-badge.out { background: var(--amber-pale); color: var(--amber); }
.log-badge.in  { background: var(--green-pale); color: var(--green); }
.log-reason { color: var(--muted); flex: 1; }
.log-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--subtle); white-space: nowrap; }

/* Entry items */
.entry-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px;
  margin-bottom: 10px;
}
.entry-hdr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.entry-num {
  font-size: 11px; font-weight: 700;
  color: var(--accent); text-transform: uppercase;
  letter-spacing: .4px;
}
.entry-detail { font-size: 13px; color: var(--muted); line-height: 1.7; }
.entry-detail b { color: var(--ink); font-weight: 600; }
.entry-amount {
  font-size: 17px; font-weight: 700;
  color: var(--green); margin-top: 5px;
  font-variant-numeric: tabular-nums;
}

/* Tasks */
.task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border-2);
}
.task-row:last-child { border-bottom: none; }
.task-lbl { flex: 1; font-size: 14px; color: var(--ink-3); font-weight: 400; }
.task-num-wrap { display: flex; align-items: center; gap: 8px; }
.task-num-inp { width: 88px; text-align: center; font-weight: 700; color: var(--accent); }
.task-unit { font-size: 11px; font-weight: 600; color: var(--subtle); text-transform: uppercase; letter-spacing: .3px; }
.task-total {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px; margin-top: 6px;
}
.task-total-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
.task-total-val { font-size: 20px; font-weight: 700; color: var(--accent); }

/* Marketing counter cards */
.mkt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mkt-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 14px; text-align: center;
  transition: border-color .15s;
}
.mkt-card:hover { border-color: var(--accent); }
.mkt-icon {
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(26,26,62,.06);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
}
.mkt-icon svg { width: 18px; height: 18px; color: var(--accent); }
.mkt-lbl { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
.mkt-counter { display: flex; align-items: center; justify-content: center; gap: 12px; }
.mkt-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--white); color: var(--ink);
  font-size: 18px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .14s; flex-shrink: 0;
  line-height: 1;
}
.mkt-btn:hover { background: var(--accent); color: var(--white); border-color: var(--accent); }
.mkt-val {
  font-size: 26px; font-weight: 700; color: var(--accent);
  min-width: 30px; text-align: center;
  font-variant-numeric: tabular-nums;
}

/* Cleaning */
.cp-card {
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color .2s;
}
.cp-card.cp-done { border-color: var(--green-mid); background: rgba(240,253,244,.5); }
.cp-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cp-circle {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 11px; font-weight: 700;
  color: var(--muted); transition: all .2s;
}
.cp-done .cp-circle { background: var(--green); border-color: var(--green); color: var(--white); }
.cp-circle svg { width: 12px; height: 12px; }
.cp-lbl { font-size: 14px; font-weight: 600; color: var(--ink-3); }
.cp-done .cp-lbl { color: var(--green); }
.cp-check-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; cursor: pointer;
}
.cp-check-row input[type=checkbox] {
  width: 18px; height: 18px;
  accent-color: var(--green); cursor: pointer; flex-shrink: 0;
}
.cp-check-lbl { font-size: 13px; font-weight: 500; color: var(--ink-3); }
.photo-zone {
  border: 1.5px dashed var(--border);
  border-radius: var(--r-sm);
  padding: 22px 16px; text-align: center;
  cursor: pointer; background: var(--surface);
  position: relative; overflow: hidden;
  transition: border-color .15s, background .15s;
}
.photo-zone:hover { border-color: var(--accent); background: rgba(26,26,62,.02); }
.photo-zone.has-photo { border-style: solid; border-color: var(--green); padding: 0; }
.photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
.photo-icon svg { width: 18px; height: 18px; color: var(--muted); }
.photo-lbl-text { font-size: 12px; color: var(--muted); font-weight: 500; }
.photo-prev { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; display: none; }
.photo-prev.show { display: block; }
.cp-time { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; font-family: 'DM Mono', monospace; }

/* Variance table */
.var-tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; border-radius: var(--r-sm); overflow: hidden; border: 1px solid var(--border); }
.var-tbl th { background: var(--accent); color: var(--white); padding: 9px 12px; font-size: 11px; font-weight: 600; text-align: center; letter-spacing: .3px; }
.var-tbl th:first-child { text-align: left; }
.var-tbl td { padding: 9px 12px; border-bottom: 1px solid var(--border-2); text-align: center; }
.var-tbl td:first-child { font-weight: 500; color: var(--ink-3); text-align: left; }
.var-tbl tr:last-child td { font-weight: 700; background: var(--surface); border-bottom: none; }
.var-pos { color: var(--green); font-weight: 700; }
.var-neg { color: var(--red); font-weight: 700; }
.var-zero { color: var(--subtle); }

/* Submit / Locked */
.submit-btn {
  width: 100%; padding: 16px; margin-top: 16px;
  background: linear-gradient(135deg, var(--green) 0%, #15803d 100%);
  color: var(--white); border: none; border-radius: var(--r-sm);
  font-size: 15px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  box-shadow: 0 4px 16px rgba(22,163,74,.28);
  transition: opacity .15s;
}
.submit-btn:active { opacity: .88; }
.submit-btn:disabled { background: var(--border); color: var(--subtle); box-shadow: none; cursor: not-allowed; }
.submit-btn svg { width: 16px; height: 16px; }
.locked-view {
  background: var(--green-pale);
  border: 1.5px solid var(--green-mid);
  border-radius: var(--r);
  padding: 28px 20px; text-align: center; margin-top: 12px;
}
.locked-icon { margin-bottom: 10px; }
.locked-icon svg { width: 36px; height: 36px; color: var(--green); }
.locked-title { font-size: 16px; font-weight: 700; color: var(--green); }
.locked-sub { font-size: 12px; color: var(--muted); margin-top: 5px; font-family: 'DM Mono', monospace; }
.missing-list {
  background: var(--red-pale); border: 1px solid var(--red-mid);
  border-radius: var(--r-sm); padding: 12px 16px; margin-top: 12px;
  font-size: 13px; color: var(--red);
}
.missing-list strong { display: block; margin-bottom: 8px; font-weight: 700; }
.missing-list li { margin: 4px 0 4px 16px; line-height: 1.5; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-icon-wrap {
  width: 56px; height: 56px; border-radius: 16px;
  background: var(--border-2); display: flex; align-items: center;
  justify-content: center; margin: 0 auto 14px;
}
.empty-icon-wrap svg { width: 24px; height: 24px; color: var(--subtle); }
.empty-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
.empty-sub { font-size: 12px; color: var(--subtle); line-height: 1.6; }

/* ─── SM PANEL ─── */
.sm-date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.sm-date-inp {
  flex: 1; padding: 10px 13px;
  border: 1.5px solid var(--border); border-radius: var(--r-sm);
  font-size: 14px; color: var(--ink); outline: none;
  transition: border-color .16s; -webkit-appearance: none;
}
.sm-date-inp:focus { border-color: var(--accent); }

/* Submission list */
.sub-item {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px;
  margin-bottom: 10px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: border-color .15s, box-shadow .15s;
}
.sub-item:hover { border-color: var(--accent); box-shadow: var(--sh-sm); }
.sub-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: var(--white);
  flex-shrink: 0; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
.sub-info { flex: 1; min-width: 0; }
.sub-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.sub-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Report sections */
.report-sec { margin-bottom: 16px; }
.rsec-hdr {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.rrow {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  padding: 6px 0; font-size: 13px;
  border-bottom: 1px solid var(--border-2);
}
.rrow:last-child { border-bottom: none; }
.rkey { color: var(--muted); flex: 1; line-height: 1.5; }
.rval { font-weight: 600; color: var(--ink); text-align: right; max-width: 55%; }

/* Score grid */
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
.score-item {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); padding: 12px;
}
.score-lbl { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 2px; text-transform: capitalize; }
.score-max { font-size: 10px; color: var(--subtle); margin-bottom: 8px; }
.score-inp {
  width: 100%; padding: 8px; border: 1.5px solid var(--border);
  border-radius: var(--r-xs); font-size: 20px; font-weight: 700;
  text-align: center; color: var(--accent); outline: none;
  -webkit-appearance: none; font-variant-numeric: tabular-nums;
  transition: border-color .15s;
}
.score-inp:focus { border-color: var(--accent); }

.total-score-card {
  background: var(--accent);
  background-image: radial-gradient(ellipse 80% 100% at 100% 50%, rgba(201,168,76,.15) 0%, transparent 70%);
  color: var(--white); border-radius: var(--r);
  padding: 20px; text-align: center; margin: 14px 0;
}
.tsc-num {
  font-size: 56px; font-weight: 700; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.tsc-denom { font-size: 20px; opacity: .5; font-weight: 400; }
.tsc-lbl { font-size: 12px; opacity: .55; margin-top: 4px; }
.tsc-grade { font-size: 14px; font-weight: 600; color: var(--gold-lt); margin-top: 6px; }

.audit-ar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.btn-approve, .btn-reject {
  padding: 13px; border-radius: var(--r-sm); border: none;
  font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: opacity .15s;
}
.btn-approve { background: var(--green); color: var(--white); }
.btn-reject { background: var(--red); color: var(--white); }
.btn-approve:hover, .btn-reject:hover { opacity: .88; }
.btn-approve svg, .btn-reject svg { width: 15px; height: 15px; }
.audit-done-view {
  background: var(--green-pale); border: 1.5px solid var(--green-mid);
  border-radius: var(--r); padding: 20px; text-align: center; margin-top: 12px;
}
.audit-done-view .ado-icon svg { width: 40px; height: 40px; color: var(--green); margin-bottom: 10px; }
.audit-done-view .ado-icon.rejected svg { color: var(--red); }
.audit-done-view .ado-title { font-size: 16px; font-weight: 700; color: var(--green); }
.audit-done-view.rejected { background: var(--red-pale); border-color: var(--red-mid); }
.audit-done-view.rejected .ado-title { color: var(--red); }

/* Dashboard */
.dash-kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.dkpi {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; text-align: center;
}
.dkpi-val { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; font-variant-numeric: tabular-nums; }
.dkpi-lbl { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: .4px; }
.ptbl {
  width: 100%; border-collapse: collapse; font-size: 13px;
  background: var(--white); border-radius: var(--r); overflow: hidden;
  border: 1px solid var(--border);
}
.ptbl th {
  background: var(--surface); padding: 10px 12px;
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-align: left; border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: .4px;
}
.ptbl td { padding: 10px 12px; border-bottom: 1px solid var(--border-2); vertical-align: middle; }
.ptbl tr:last-child td { border-bottom: none; }
.sbar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 4px; }
.sbar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--gold)); }

/* Settings */
.staff-chip {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(26,26,62,.06); border: 1px solid rgba(26,26,62,.1);
  color: var(--accent); padding: 6px 12px;
  border-radius: 99px; font-size: 12px; font-weight: 600;
}
.staff-chip-remove {
  cursor: pointer; opacity: .4; font-size: 16px;
  line-height: 1; transition: opacity .14s;
}
.staff-chip-remove:hover { opacity: 1; }
.danger-zone { border: 1.5px solid var(--red-mid); border-radius: var(--r); padding: 18px; margin-top: 12px; }
.danger-zone-hdr { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
.danger-zone-hdr svg { width: 14px; height: 14px; }

/* ── TOAST ── */
.toast-wrap {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 7px;
  pointer-events: none; width: calc(100% - 32px); max-width: 360px;
}
.toast {
  background: var(--ink); color: var(--white);
  padding: 12px 16px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--sh-md);
  display: flex; align-items: center; gap: 10px;
  animation: t-in .2s ease, t-out .3s ease 2.7s forwards;
  border-left: 3px solid rgba(255,255,255,.2);
}
.toast.ok   { border-left-color: var(--green); }
.toast.err  { background: var(--red-pale); color: var(--red); border-left-color: var(--red); }
.toast.warn { background: var(--amber-pale); color: var(--amber); border-left-color: var(--amber); }
.toast-icon { flex-shrink: 0; display: flex; align-items: center; }
.toast-icon svg { width: 14px; height: 14px; }
@keyframes t-in  { from { transform: translateY(10px); opacity: 0; } to { opacity: 1; transform: translateY(0); } }
@keyframes t-out { to { opacity: 0; transform: translateY(-4px); } }

/* ── MODAL ── */
.modal-ov {
  position: fixed; inset: 0;
  background: rgba(10,10,31,.55);
  backdrop-filter: blur(4px);
  z-index: 2000; display: none;
  align-items: flex-end; justify-content: center;
}
.modal-ov.open { display: flex; }
.modal-sheet {
  background: var(--white);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 18px 20px 32px;
  width: 100%; max-width: 480px;
  max-height: 88dvh; overflow-y: auto;
  animation: sheet-up .24s cubic-bezier(.34,1.56,.64,1);
}
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border); border-radius: 99px;
  margin: 0 auto 18px;
}
.modal-title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="scr-login" class="screen active">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-mark">
        <!-- Watch icon -->
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="10" stroke="#1a1a3e" stroke-width="2.2"/>
          <path d="M16 10v6l4 2.5" stroke="#1a1a3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="12" y="4" width="8" height="4" rx="1.5" fill="#1a1a3e"/>
          <rect x="12" y="24" width="8" height="4" rx="1.5" fill="#1a1a3e"/>
        </svg>
      </div>
      <h1>Saagar Traders</h1>
      <div class="brand-sub">Daily Staff Register</div>
    </div>

    <div class="login-card">
      <div class="login-date-pill">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M1 6h14" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v2M11 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="login-date-pill-text">—</span>
      </div>

      <div class="role-sw">
        <button class="role-sw-btn active" id="rtab-staff" onclick="setLoginRole('staff')">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Staff
        </button>
        <button class="role-sw-btn" id="rtab-sm" onclick="setLoginRole('sm')">
          <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="2" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="9" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.5"/><path d="M9 11.5h5M11.5 9v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Manager
        </button>
      </div>

      <!-- Staff form -->
      <div class="lform active" id="lform-staff">
        <div class="lf-group">
          <label class="lf-lbl">Your Name <span class="req">*</span></label>
          <input class="lf-inp" id="staff-name-inp" list="staff-datalist" placeholder="Type or select your name" autocomplete="off" />
          <datalist id="staff-datalist"></datalist>
        </div>
        <div class="lf-group">
          <label class="lf-lbl">Your Role <span class="req">*</span></label>
          <select class="lf-inp" id="staff-role-sel">
            <option value="cro">CRO — Customer Relationship Officer</option>
            <option value="rso">RSO — Retail Sales Officer</option>
          </select>
        </div>
        <button class="btn-login" onclick="loginStaff()">
          Start Today's Register
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- SM form -->
      <div class="lform" id="lform-sm">
        <div class="lf-group">
          <label class="lf-lbl">Manager Password <span class="req">*</span></label>
          <input class="lf-inp" id="sm-pw-inp" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')loginSM()" />
        </div>
        <button class="btn-login" onclick="loginSM()">
          Login as Manager
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     STAFF PANEL
══════════════════════════════════════ -->
<div id="scr-staff" class="screen">
  <header class="app-header staff-header">
    <div class="hdr-brand">
      <div class="hdr-dot">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="#1a1a3e" stroke-width="1.8"/><path d="M8 5v3l2 1.5" stroke="#1a1a3e" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="hdr-name" id="staff-hdr-name">—</div>
        <div class="hdr-sub" id="staff-hdr-date">—</div>
      </div>
    </div>
    <div class="hdr-actions">
      <span class="hdr-chip" id="staff-role-badge">CRO</span>
      <span class="hdr-clock" id="live-clock">00:00</span>
      <button class="hdr-btn-exit" onclick="logout()">Exit</button>
    </div>
  </header>

  <div class="tabbar">
    <div class="tabbar-inner" id="staff-tnav">
      <button class="tab-btn active" id="stbtn-daystart" onclick="goStaffTab('daystart')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M1 6h14" stroke="currentColor" stroke-width="1.5"/></svg>
        Day Start<span class="tab-dot"></span>
      </button>
      <button class="tab-btn" id="stbtn-opening" onclick="goStaffTab('opening')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 13V6l5-4 5 4v7H3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><rect x="6" y="9" width="4" height="4" rx=".5" stroke="currentColor" stroke-width="1.3"/></svg>
        Opening<span class="tab-dot"></span>
      </button>
      <button class="tab-btn" id="stbtn-inout" onclick="goStaffTab('inout')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 8H2M6 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 2v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        In/Out<span class="tab-dot"></span>
      </button>
      <button class="tab-btn" id="stbtn-sales" onclick="goStaffTab('sales')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="6" cy="13" r="1.2" stroke="currentColor" stroke-width="1.3"/><circle cx="12" cy="13" r="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M1 1h2l2.5 8h6l1.5-5H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sales<span class="tab-dot"></span>
      </button>
      <button class="tab-btn" id="stbtn-nonpurch" onclick="goStaffTab('nonpurch')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Visitors<span class="tab-dot"></span>
      </button>
      <button class="tab-btn" id="stbtn-tasks" onclick="goStaffTab('tasks')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Tasks<span class="tab-dot"></span>

<script>
/* ══════════════════════════════════════════════════
   CONSTANTS & STATE
══════════════════════════════════════════════════ */
const SM_PASS  = 'Gold';
const SK_DSR   = 'saagar_dsr_';
const SK_STAFF = 'saagar_dsr_staff';

const DEFAULT_STAFF = ['Rahul Kumar','Priya Sharma','Amit Patel','Sunita Devi','Raj Mehta'];

const IO_REASONS = ['Break','Work Related','Personal','Training','Site Visit','Other'];
const NP_REASONS = ['No Budget','Just Browsing','Will Decide Later','Price Issue','Wrong Design','Wrong Size','Other'];

const PROD_GROUPS = [
  { label: 'Titan World (WLMHW)', short: 'Titan World', items: [
    'CLASSIC','XYLYS','REGALIA','AUTOMATIC','EDGE','RAGA',
    'PURPLE GENTS','PURPLE LADIES','WORKWEAR','OCTANE','ZOOP','SKINN',
    'KARISHMA GENTS','KARISHMA LADIES','BANDHAN','FASTTRACK','SONATA',
    'VYB','SUPER FIBER','TEES','WALL CLOCK','TITAN SMART','FASTTRACK SMART'
  ]},
  { label: 'Helios (HEMW)', short: 'Helios', items: [
    'SEIKO','CITIZEN','CERRUTI','FOSSIL','GUESS','POLICE',
    'G-SHOCK','KENNETH COLE','TOMMY HILFIGER','ANNE KLEIN','AMAZFIT','FITBIT'
  ]},
];
const PROD_TYPES = PROD_GROUPS.flatMap(g => g.items);
const STOCK_CATS = PROD_GROUPS.flatMap(g =>
  g.items.map(name => ({ id: slugId(g.short + '_' + name), label: name, group: g.short }))
);

const TASK_LIST = [
  { id: 'cust',        label: 'Customer Handling Done' },
  { id: 'follow',      label: 'Follow-ups Completed' },
  { id: 'disp',        label: 'Display Maintained' },
  { id: 'clean_floor', label: 'Store Floor Cleaned' },
];

const MKT_ITEMS = [
  { id: 'calls',    label: 'Customer Calls',      svgPath: 'M3 3h2.5l1 3-1.5 1.5c.9 1.85 2.5 3.35 4.5 4.5L11 10.5l3 1V14a1 1 0 01-1 1C5.5 15 1 9.5 1 4a1 1 0 011-1z' },
  { id: 'whatsapp', label: 'WhatsApp Catalogue',  svgPath: 'M8 1a7 7 0 100 14c1.5 0 2.9-.47 4.05-1.27L14 14l-.73-1.95A7 7 0 008 1z' },
  { id: 'door',     label: 'Door-to-Door Visits', svgPath: 'M3 13V6l5-4 5 4v7H3zM6 13V9h4v4' },
  { id: 'instore',  label: 'In-Store Promotion',  svgPath: 'M1 9V7l10-5v12L1 9zM11 6.5c1.657 0 3 .672 3 1.5s-1.343 1.5-3 1.5' },
];

const SCORE_MAX = { opening: 10, sales: 20, marketing: 20, tasks: 10, cleaning: 20, closing: 20 };

let st = {
  screen: 'login',
  staffName: '', role: 'cro',
  date: todayStr(), tab: 'daystart',
  smTab: 'submissions', smDate: todayStr(),
  auditRec: null,
};

/* ── UTILITIES ── */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[+m-1]} ${y}`;
}
function fmtAmt(n) { return '₹' + (Number(n)||0).toLocaleString('en-IN'); }
function el(id) { return document.getElementById(id); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function slugId(s) { return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,''); }
function emptyStockValues() { return Object.fromEntries(STOCK_CATS.map(c => [c.id, ''])); }
function emptyTaskValues() { const o = { additional: '' }; TASK_LIST.forEach(t => o[t.id] = ''); return o; }
function taskNumber(v) {
  if (v === true) return 1;
  if (!v && v !== 0) return 0;
  const n = Number(v);
  return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
}
function taskEntered(v) { return v !== null && v !== undefined && v !== '' && v !== false; }
function taskTotal(tasks) { return TASK_LIST.reduce((sum, t) => sum + taskNumber(tasks?.[t.id]), 0); }
function stockTotal(obj) { return STOCK_CATS.reduce((s, c) => s + (Number(obj[c.id])||0), 0); }
function normalizeRecord(rec) {
  rec.opening = rec.opening || {};
  rec.closing  = rec.closing  || {};
  STOCK_CATS.forEach(c => {
    if (rec.opening[c.id] === undefined) rec.opening[c.id] = '';
    if (rec.closing[c.id]  === undefined) rec.closing[c.id]  = '';
  });
  rec.tasks = rec.tasks || {};
  TASK_LIST.forEach(t => {
    if (rec.tasks[t.id] === true)  rec.tasks[t.id] = 1;
    else if (!taskEntered(rec.tasks[t.id])) rec.tasks[t.id] = '';
  });
  if (rec.tasks.additional === undefined) rec.tasks.additional = '';
  if (!Array.isArray(rec.nonpurch)) rec.nonpurch = [];
  rec.nonpurch.forEach(n => { if (n.mobile === undefined) n.mobile = ''; });
  return rec;
}
function renderProductOptions(selected) {
  const sel = selected || PROD_TYPES[0];
  const legacy = sel && !PROD_TYPES.includes(sel) ? `<option selected>${esc(sel)}</option>` : '';
  return legacy + PROD_GROUPS.map(g =>
    `<optgroup label="${esc(g.label)}">${g.items.map(p => `<option value="${esc(p)}"${p===sel?' selected':''}>${esc(p)}</option>`).join('')}</optgroup>`
  ).join('');
}

/* ── TOAST ── */
function toast(msg, type='', dur=3000) {
  const icons = {
    ok: '<svg viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    err: '<svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    warn: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 2l6 12H2L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 7v3M8 11.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
    '': '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v4M8 5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
  };
  const w = el('toast-wrap');
  const d = document.createElement('div');
  d.className = 'toast' + (type ? ' ' + type : '');
  d.innerHTML = `<span class="toast-icon">${icons[type]||icons['']}</span><span>${msg}</span>`;
  w.appendChild(d);
  setTimeout(() => d.remove(), dur + 300);
}

/* ── STORAGE ── */
function recKey(date, name) { return SK_DSR + date + '_' + name.replace(/\s+/g,'_'); }
function blankRecord(date, name, role) {
  return {
    date, staffName: name, role, loginTime: nowTime(),
    opening: emptyStockValues(), inout: [], sales: [],
    nonpurch: [], tasks: emptyTaskValues(),
    marketing: { calls:0, whatsapp:0, door:0, instore:0 },
    cleaning: {
      cp1: { done:false, photo:null, time:null },
      cp2: { done:false, photo:null, time:null },
    },
    closing: emptyStockValues(),
    submitted: false, submitTime: null, audit: null,
  };
}
function getRecord() {
  const k = recKey(st.date, st.staffName);
  try { const s = localStorage.getItem(k); if (s) return normalizeRecord(JSON.parse(s)); } catch(e){}
  return blankRecord(st.date, st.staffName, st.role);
}
function saveRec(rec) {
  try { localStorage.setItem(recKey(rec.date, rec.staffName), JSON.stringify(rec)); } catch(e) {
    toast('Storage error — data may not be saved!','err');
  }
}
function getAllForDate(date) {
  const recs = [];
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith(SK_DSR+date+'_')) continue;
    try { recs.push(JSON.parse(localStorage.getItem(k))); } catch(e){}
  }
  return recs;
}
function getAllInRange(from, to) {
  const recs = [];
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith(SK_DSR)) continue;
    const m = k.match(/^saagar_dsr_(\d{4}-\d{2}-\d{2})_/);
    if (!m) continue;
    if (m[1] >= from && m[1] <= to) {
      try { recs.push(JSON.parse(localStorage.getItem(k))); } catch(e){}
    }
  }
  return recs;
}
function getStaffList() {
  try {
    const s = localStorage.getItem(SK_STAFF);
    if (s) { const a = JSON.parse(s); if (Array.isArray(a) && a.length) return a; }
  } catch(e){}
  return [...DEFAULT_STAFF];
}
function saveStaffList(arr) { localStorage.setItem(SK_STAFF, JSON.stringify(arr)); }

/* ── ROUTING ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el('scr-'+id)?.classList.add('active');
  st.screen = id;
}
function goStaffTab(tab) {
  st.tab = tab;
  document.querySelectorAll('#staff-tnav .tab-btn').forEach(b => b.classList.remove('active'));
  el('stbtn-'+tab)?.classList.add('active');
  document.querySelectorAll('#staff-content .tsec').forEach(s => s.classList.remove('active'));
  el('tsec-'+tab)?.classList.add('active');
  renderCurrentTab();
}
function goSMTab(tab) {
  st.smTab = tab;
  document.querySelectorAll('#sm-tnav .tab-btn').forEach(b => b.classList.remove('active'));
  el('smtbtn-'+tab)?.classList.add('active');
  document.querySelectorAll('#sm-content .tsec').forEach(s => s.classList.remove('active'));
  el('stsec-'+tab)?.classList.add('active');
  renderSMTab(tab);
}

/* ── LOGIN ── */
function setLoginRole(role) {
  el('rtab-staff').classList.toggle('active', role==='staff');
  el('rtab-sm').classList.toggle('active', role==='sm');
  el('lform-staff').classList.toggle('active', role==='staff');
  el('lform-sm').classList.toggle('active', role==='sm');
  el('login-err').textContent = '';
  if (role==='sm') setTimeout(() => el('sm-pw-inp').focus(), 80);
}
function loginStaff() {
  const name = el('staff-name-inp').value.trim();
  const role = el('staff-role-sel').value;
  if (!name) { el('staff-name-inp').classList.add('err'); el('login-err').textContent='Please enter your name.'; return; }
  el('staff-name-inp').classList.remove('err');
  const list = getStaffList();
  if (!list.includes(name)) { list.push(name); saveStaffList(list); }
  st.staffName = name; st.role = role; st.date = todayStr(); st.tab = 'daystart';
  enterStaffPanel();
}
function loginSM() {
  if (el('sm-pw-inp').value !== SM_PASS) {
    el('login-err').textContent = 'Incorrect password.';
    el('sm-pw-inp').value = ''; el('sm-pw-inp').focus(); return;
  }
  el('login-err').textContent = '';
  showScreen('sm'); goSMTab('submissions');
}
function logout() {
  showScreen('login');
  el('staff-name-inp').value=''; el('sm-pw-inp').value='';
  el('login-err').textContent='';
  st.staffName = ''; st.auditRec = null;
}

/* ── STAFF ENTRY ── */
function enterStaffPanel() {
  el('staff-hdr-name').textContent = st.staffName;
  el('staff-hdr-date').textContent = fmtDate(st.date);
  el('staff-role-badge').textContent = st.role.toUpperCase();
  showScreen('staff');
  goStaffTab('daystart');
  startClock();
}
function startClock() {
  const tick = () => {
    if (st.screen !== 'staff') return;
    const n = new Date();
    el('live-clock').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    setTimeout(tick, 1000);
  };
  tick();
}
function renderCurrentTab() {
  const renders = {
    daystart: renderDayStart, opening: renderOpening,
    inout: renderInOut, sales: renderSales,
    nonpurch: renderNonPurch, tasks: renderTasks,
    marketing: renderMarketing, cleaning: renderCleaning,
    closing: renderClosing,
  };
  renders[st.tab]?.();
  updateProgress();
}

/* ── PROGRESS ── */
function updateProgress() {
  const rec = getRecord();
  const checks = [
    true,
    STOCK_CATS.every(c => rec.opening[c.id] !== ''),
    true,
    true,
    true,
    TASK_LIST.every(t => taskEntered(rec.tasks[t.id])),
    true,
    rec.cleaning.cp1.done && rec.cleaning.cp2.done,
    STOCK_CATS.every(c => rec.closing[c.id] !== ''),
  ];
  const tabs = ['daystart','opening','inout','sales','nonpurch','tasks','marketing','cleaning','closing'];
  checks.forEach((done, i) => el('stbtn-'+tabs[i])?.classList.toggle('done', done));
  const done = checks.filter(Boolean).length;
  el('pbar-fill').style.width = (done/9*100)+'%';
  el('pbar-lbl').textContent = done + ' / 9';
}

/* ══════════════════════════════════════
   TAB: DAY START
══════════════════════════════════════ */
function renderDayStart() {
  const rec = getRecord();
  const isOut = rec.inout.length > 0 && rec.inout[rec.inout.length-1].type === 'out';
  const totalSales = rec.sales.reduce((s,x) => s+(+x.amount||0), 0);
  el('tsec-daystart').innerHTML = `
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">
          <div class="card-icon ci-navy"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
          Staff Info
        </div>
        ${rec.submitted ? '<span class="badge badge-green"><svg viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Submitted</span>' : ''}
      </div>
      <div class="info-row"><span class="info-key">Name</span><span class="info-val">${esc(rec.staffName)}</span></div>
      <div class="info-row"><span class="info-key">Role</span><span class="info-val">${rec.role.toUpperCase()}</span></div>
      <div class="info-row"><span class="info-key">Date</span><span class="info-val">${fmtDate(rec.date)}</span></div>
      <div class="info-row"><span class="info-key">Login Time</span><span class="info-val" style="font-family:'DM Mono',monospace">${rec.loginTime}</span></div>
      ${rec.submitted ? `<div class="info-row"><span class="info-key">Submitted At</span><span class="info-val" style="font-family:'DM Mono',monospace">${rec.submitTime}</span></div>` : ''}
    </div>
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">
          <div class="card-icon ci-gold"><svg viewBox="0 0 16 16" fill="none"><rect x="1" y="8" width="4" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="6" y="4" width="4" height="11" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="1" width="4" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></div>
          Today's Progress
        </div>
      </div>
      <div class="info-row"><span class="info-key">Sales</span><span class="info-val">${rec.sales.length} bill${rec.sales.length!==1?'s':''} · ${fmtAmt(totalSales)}</span></div>
      <div class="info-row"><span class="info-key">Visitors</span><span class="info-val">${rec.nonpurch.length} logged</span></div>
      <div class="info-row"><span class="info-key">Status</span><span class="info-val">${isOut ? '<span class="badge badge-amber">Out of Store</span>' : '<span class="badge badge-green">In Store</span>'}</span></div>
      <div class="info-row"><span class="info-key">Cleaning</span><span class="info-val">${rec.cleaning.cp1.done && rec.cleaning.cp2.done ? '<span class="badge badge-green">Both Done</span>' : rec.cleaning.cp1.done ? '<span class="badge badge-amber">1 of 2</span>' : '<span class="badge badge-red">Pending</span>'}</span></div>
      <div class="info-row"><span class="info-key">Marketing</span><span class="info-val">${Object.values(rec.marketing).reduce((s,v)=>s+(+v||0),0)} activities</span></div>
    </div>`;
}

/* ══════════════════════════════════════
   TAB: OPENING STOCK
══════════════════════════════════════ */
function renderOpening() {
  const rec = getRecord();
  const locked = rec.submitted;
  el('tsec-opening').innerHTML = `
    <div class="card">

function renderInOut() {
  const rec = getRecord();
  const locked = rec.submitted;
  const log = rec.inout;
  const isOut = log.length > 0 && log[log.length-1].type === 'out';
  const dur = calcTimeOut(log);
  el('tsec-inout').innerHTML = `
    <div class="io-status ${isOut?'io-out':'io-in'}">

      <div class="io-status-body">

        <div class="io-status-sub">${dur > 0 ? 'Time out today: ' + fmtDur(dur) : 'Track your in/out movements below'}</div>
      </div>
    </div>
    ${!locked ? (isOut
      ? `<button class="btn btn-green btn-lg" style="margin-bottom:14px" onclick="logIn()"><svg viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Mark Back In</button>`
      : `<button class="btn btn-amber btn-lg" style="margin-bottom:14px" onclick="showIOModal()"><svg viewBox="0 0 16 16" fill="none"><path d="M10 8H2M6 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 2v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Mark Out of Store</button>`) : ''}
    <div class="card">
      <div class="card-hdr">
        <div class="card-title"><div class="card-icon ci-sky"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>Movement Log</div>
      </div>
      ${log.length === 0
        ? `<div class="empty-state">
            <div class="empty-icon-wrap"><svg viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
            <div class="empty-title">No movements logged</div>
            <div class="empty-sub">Use the button above to track when you leave or return.</div>
           </div>`
        : log.map(e => `
          <div class="log-item">
            <span class="log-badge ${e.type}">${e.type.toUpperCase()}</span>
            <span class="log-reason">${esc(e.reason||'—')}</span>
            <span class="log-time">${e.time}</span>
          </div>`).join('')}
    </div>`;
}
function calcTimeOut(log) {
  let total = 0, outTime = null;
  log.forEach(e => {
    if (e.type==='out') outTime = parseHMS(e.time);
    else if (e.type==='in' && outTime) { total += parseHMS(e.time) - outTime; outTime = null; }
  });
  if (outTime) total += Date.now()/1000 - outTime;
  return total;
}
function parseHMS(hms) {
  const [h,m,s] = (hms||'00:00:00').split(':').map(Number);
  return h*3600 + m*60 + (s||0);
}
function fmtDur(secs) {
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
  return (h > 0 ? h+'h ' : '') + m + 'm';
}

function logOut() {

}

  reader.onload = e => {

    rec.cleaning[`cp${n}`].time = nowTime();
    rec.cleaning[`cp${n}`].done = true;
    saveRec(rec); renderCleaning(); updateProgress();
    toast(`Checkpoint ${n} photo saved`,'ok');

}
function updClosing(cat, val) {
  const rec = getRecord();
  if (rec.submitted) return;
  rec.closing[cat] = val; saveRec(rec);
  el('cl-total').textContent = stockTotal(rec.closing);
  updateProgress();
}
function getMissingForSubmit(rec) {
  const m = [];
  if (!STOCK_CATS.every(c => rec.opening[c.id] !== '')) m.push('Opening stock — enter counts for all brands');
  if (!TASK_LIST.every(t => taskEntered(rec.tasks[t.id]))) m.push('Daily task counts — fill all items');
  if (!rec.cleaning.cp1.done || !rec.cleaning.cp1.photo) m.push('Cleaning Checkpoint 1 — mark done & attach photo');
  if (!rec.cleaning.cp2.done || !rec.cleaning.cp2.photo) m.push('Cleaning Checkpoint 2 — mark done & attach photo');
  if (!STOCK_CATS.every(c => rec.closing[c.id] !== '')) m.push('Closing stock — enter counts for all brands');
  return m;
}
function showSubmitConfirm() {
  el('modal-body').innerHTML = `
    <div class="modal-title">Submit Day Report?</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.7">
      Once submitted, <strong>all data will be locked</strong> and cannot be edited. The manager will review and audit your report.
    </p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" style="flex:1" onclick="submitDay()">Submit Now</button>
    </div>`;
  openModal();
}
function submitDay() {
  const rec = getRecord();
  if (rec.submitted) { closeModal(); return; }
  const miss = getMissingForSubmit(rec);
  if (miss.length > 0) { closeModal(); toast('Complete all sections first','err'); return; }
  rec.submitted = true; rec.submitTime = nowTime();
  saveRec(rec); closeModal();
  toast('Day report submitted successfully','ok');
  renderClosing(); updateProgress();
}

function selectAudit(date, name) {
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k===recKey(date,name) || k===recKey(date,name.replace(/_/g,' '))) {
      try { st.auditRec=JSON.parse(localStorage.getItem(k)); break; } catch(e){}
    }
  }
  if (!st.auditRec) {
    for (let i=0; i<localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(SK_DSR+date+'_')) {
        try {
          const r = JSON.parse(localStorage.getItem(k));
          if (r.staffName===name || r.staffName===name.replace(/_/g,' ')) { st.auditRec=r; break; }
        } catch(e){}
      }
    }
  }
  if (!st.auditRec) { toast('Record not found','err'); return; }
  goSMTab('audit');
}

function calcAutoScores(r) {
  return {
    opening: STOCK_CATS.every(c => r.opening[c.id]!=='') ? 10 : 0,
    sales: Math.min(20, r.sales.length * 4),
    marketing: Math.min(20, MKT_ITEMS.reduce((s,m) => s+(+r.marketing[m.id]||0),0) * 2),
    tasks: Math.round(TASK_LIST.filter(t => taskNumber(r.tasks[t.id])>0).length / TASK_LIST.length * 10),
    cleaning: (r.cleaning.cp1.done&&r.cleaning.cp1.photo?10:0)+(r.cleaning.cp2.done&&r.cleaning.cp2.photo?10:0),
    closing: STOCK_CATS.every(c => r.closing[c.id]!=='') ? 20 : 0,
  };
}
function calcTotalScore() {
  let total = 0;
  Object.keys(SCORE_MAX).forEach(s => {
    const inp = el('sc-'+s);
    if (inp) total += Math.min(SCORE_MAX[s], Math.max(0, +inp.value||0));
  });
  const numEl = el('tsc-num'); if (numEl) numEl.textContent = total;
  const grEl = el('tsc-grade');
  if (grEl) grEl.textContent = total>=90?'Excellent':total>=75?'Good':total>=60?'Average':'Needs Improvement';
}
function submitAudit(approved) {
  const scores = {}; let total = 0;
  Object.keys(SCORE_MAX).forEach(s => {
    const v = Math.min(SCORE_MAX[s], Math.max(0, +el('sc-'+s)?.value||0));
    scores[s]=v; total+=v;
  });
  if (!st.auditRec) return;
  st.auditRec.audit = { approved, total, ...scores, remarks:el('audit-remarks')?.value||'', auditTime:nowTime() };
  saveRec(st.auditRec);
  toast(approved?'Report approved':'Report rejected', approved?'ok':'warn');
  renderSMAudit(); renderSMSubmissions();
}
function resetAudit() {
  if (!st.auditRec) return;
  if (!confirm('Reset this audit and re-score?')) return;
  st.auditRec.audit=null; saveRec(st.auditRec); renderSMAudit();
}

  const totalSales = recs.reduce((s,r)=>s+r.sales.reduce((ss,x)=>ss+(+x.amount||0),0),0);

  const avgScore = withScores.length>0 ? Math.round(withScores.reduce((s,r)=>s+r.audit.total,0)/withScores.length) : null;

  const byStaff = {};

    ${Object.keys(byStaff).length===0
      ? `<div class="empty-state"><div class="empty-icon-wrap"><svg viewBox="0 0 16 16" fill="none"><rect x="1" y="8" width="4" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="6" y="4" width="4" height="11" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="1" width="4" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></div><div class="empty-title">No data yet</div><div class="empty-sub">Submitted records from the last 30 days will appear here.</div></div>`
      : `<table class="ptbl">
           <thead><tr><th>Staff</th><th>Days</th><th>Sales</th><th>Mkt</th><th>Score</th></tr></thead>
           <tbody>
             ${Object.entries(byStaff).map(([name,d]) => {
               const avg = d.scores.length ? Math.round(d.scores.reduce((a,b)=>a+b,0)/d.scores.length) : null;
               return `<tr>
                 <td><strong>${esc(name)}</strong></td>
                 <td style="text-align:center">${d.days}</td>
                 <td>${fmtAmt(d.sales)}</td>
                 <td style="text-align:center">${d.mkt}</td>
                 <td>${avg!=null?`${avg}<div class="sbar-wrap"><div class="sbar" style="width:${avg}%"></div></div>`:'—'}</td>
               </tr>`;}).join('')}
           </tbody>
         </table>`}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn btn-primary btn-sm" onclick="exportAllCSV()">Export 30-Day CSV</button>
      <button class="btn btn-outline btn-sm" onclick="exportAllCSV('today')">Export Today</button>
    </div>`;
}

/* ── SETTINGS ── */
function renderSMSettings() {
  const list = getStaffList();
  el('stsec-settings').innerHTML = `
    <div class="card">
      <div class="card-hdr">
        <div class="card-title"><div class="card-icon ci-navy"><svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>Staff Members</div>
      </div>
      <div id="staff-chip-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        ${list.map((s,i) => `
          <span class="staff-chip">
            ${esc(s)}
            <span class="staff-chip-remove" onclick="removeStaff(${i})">×</span>
          </span>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <input class="finp" id="new-staff-inp" placeholder="Add new staff name" style="flex:1" onkeydown="if(event.key==='Enter')addStaff()" />
        <button class="btn btn-primary" onclick="addStaff()">Add</button>
      </div>
    </div>
    <div class="danger-zone">
      <div class="danger-zone-hdr">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2l6 12H2L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 7v3M8 11.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Danger Zone
      </div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6">Permanently delete all staff records. This cannot be undone.</p>
      <button class="btn btn-red btn-sm" onclick="confirmDeleteAll()">Delete All Records</button>
    </div>`;
}
function addStaff() {
  const name = el('new-staff-inp').value.trim();
  if (!name) return;
  const list = getStaffList();
  if (list.includes(name)) { toast('Name already exists','warn'); return; }
  list.push(name); saveStaffList(list);
  el('new-staff-inp').value='';
  renderSMSettings();
  toast('Staff added: '+name,'ok');
}
function removeStaff(i) {
  const list = getStaffList();
  if (!confirm(`Remove "${list[i]}" from staff list?`)) return;
  list.splice(i,1); saveStaffList(list);
  renderSMSettings(); toast('Staff removed','warn');
}
function confirmDeleteAll() {
  el('modal-body').innerHTML = `
    <div class="modal-title" style="color:var(--red)">Delete All Records?</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7">
      This will permanently delete <strong>all staff daily records</strong>. This action <strong>cannot be undone</strong>.
    </p>
    <div class="fgrp">
      <label class="flbl">Type DELETE to confirm</label>
      <input class="finp" id="del-confirm-inp" placeholder="DELETE" />
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" style="flex:1" onclick="doDeleteAll()">Delete All</button>
    </div>`;
  openModal();
}
function doDeleteAll() {
  if (el('del-confirm-inp')?.value !== 'DELETE') { toast('Type DELETE exactly','err'); return; }
  const toDelete = [];
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(SK_DSR)) toDelete.push(k);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
  closeModal(); toast(`${toDelete.length} records deleted`,'warn'); renderSMSubmissions();
}

/* ── CSV EXPORT ── */
function csvCell(v) { return '"' + String(v===null||v===undefined?'':v).replace(/"/g,'""') + '"'; }
function downloadCSV(filename, rows) {
  const csv = '\ufeff' + rows.map(r => r.map(csvCell).join(',')).join('\r\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename.replace(/[\\/:*?"<>|]/g,'_').slice(0,160);
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
  toast('CSV exported','ok');
}
function exportSingleCSV() {
  const r = st.auditRec; if (!r) { toast('No record selected','err'); return; }
  const rows = [
    ['Field','Value'],
    ['Staff Name',r.staffName],['Date',r.date],['Role',r.role.toUpperCase()],
    ['Login Time',r.loginTime],['Submit Time',r.submitTime||'—'],
    ...STOCK_CATS.map(c=>['Opening '+c.label,r.opening[c.id]||0]),
    ['Total Sales Bills',r.sales.length],
    ['Total Sales Amount',r.sales.reduce((s,x)=>s+(+x.amount||0),0)],
    ...r.sales.map((s,i)=>['Sale #'+(i+1),`Bill:${s.billNo}|${s.product}|${s.amount}|${s.customer||'—'}`]),
    ['Non-Purchase Visitors',r.nonpurch.length],
    ...r.nonpurch.map((n,i)=>['Visitor #'+(i+1),`${n.customer||'Anon'}|${n.mobile||'—'}|${n.reason}|${n.remarks||'—'}`]),
    ...TASK_LIST.map(t=>['Task: '+t.label,taskNumber(r.tasks[t.id])]),
    ['Total Tasks',taskTotal(r.tasks)],
    ...MKT_ITEMS.map(m=>['Marketing: '+m.label,r.marketing[m.id]||0]),
    ['CP1',r.cleaning.cp1.done?'Done':'No'],['CP2',r.cleaning.cp2.done?'Done':'No'],
    ...STOCK_CATS.map(c=>['Closing '+c.label,r.closing[c.id]||0]),
    ['Score',r.audit?.total??'—'],
    ['Status',r.audit?.approved===true?'Approved':r.audit?.approved===false?'Rejected':'Pending'],
    ['SM Remarks',r.audit?.remarks||'—'],
  ];
  downloadCSV(`report_${r.date}_${r.staffName.replace(/\s/g,'_')}.csv`, rows);
}
function exportAllCSV(mode) {
  const to = todayStr();
  const fromD = new Date(); fromD.setDate(fromD.getDate()-29);
  const from = mode==='today' ? to : fromD.getFullYear()+'-'+String(fromD.getMonth()+1).padStart(2,'0')+'-'+String(fromD.getDate()).padStart(2,'0');
  const recs = getAllInRange(from, to).filter(r=>r.submitted);
  if (!recs.length) { toast('No records to export','warn'); return; }
  const rows = [['Date','Staff','Role','Login','Bills','Sales','Visitors','Mkt Total','Tasks Total','CP1','CP2','Score','Status']];
  recs.forEach(r => {
    rows.push([
      r.date, r.staffName, r.role.toUpperCase(), r.loginTime,
      r.sales.length, r.sales.reduce((s,x)=>s+(+x.amount||0),0),
      r.nonpurch.length, MKT_ITEMS.reduce((s,m)=>s+(+r.marketing[m.id]||0),0),
      taskTotal(r.tasks),
      r.cleaning.cp1.done?'Done':'No', r.cleaning.cp2.done?'Done':'No',
      r.audit?.total??'—',
      r.audit?.approved===true?'Approved':r.audit?.approved===false?'Rejected':'Pending',
    ]);
  });
  downloadCSV(`saagar_${mode==='today'?'today':from+'_to_'+to}.csv`, rows);
}

function openModal() { el('modal').classList.add('open'); }
function closeModal() { el('modal').classList.remove('open'); }
function modalBgClick(e) { if (e.target===el('modal')) closeModal(); }

  const today = todayStr();
  const [y,m,d] = today.split('-');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  el('login-date-pill-text').textContent = `${d} ${months[+m-1]} ${y}`;

  const list = getStaffList();
  const dl = el('staff-datalist');
  dl.innerHTML = list.map(n => `<option value="${esc(n)}">`).join('');
}

init();
