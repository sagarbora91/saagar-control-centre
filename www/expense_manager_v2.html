<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Expense Manager — Central Financial Ledger · Saagar Traders</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d2340;--navy-mid:#1a3a5c;--navy-light:#264d7a;
  --gold:#b8922a;--gold-light:#d4a843;--gold-pale:#fdf6e3;
  --cream:#faf8f3;--white:#ffffff;
  --red:#b91c1c;--red-pale:#fef2f2;--amber:#b45309;--amber-pale:#fffbeb;
  --green:#166534;--green-pale:#f0fdf4;--green-mid:#bbf7d0;
  --blue:#1d4ed8;--blue-pale:#eff6ff;--purple:#7c3aed;--purple-pale:#f5f3ff;
  --gray-100:#f4f4f5;--gray-200:#e4e4e7;--gray-300:#d4d4d8;
  --gray-400:#a1a1aa;--gray-600:#52525b;--gray-800:#27272a;
  --shadow:0 2px 12px rgba(13,35,64,.08);--shadow-lg:0 12px 30px rgba(13,35,64,.14);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--cream);color:var(--gray-800);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
h1,h2,h3,h4{font-family:'DM Serif Display',Georgia,serif;color:var(--navy);font-weight:400;line-height:1.15}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
button:disabled{opacity:.5;cursor:not-allowed}
.hide{display:none!important}
.mono{font-variant-numeric:tabular-nums}

/* HEADER */
.hdr{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hdr .logo{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:grid;place-items:center;font-family:'DM Serif Display',serif;color:var(--navy);font-size:18px}
.hdr h1{color:#fff;font-size:18px}
.hdr .sub{color:var(--gold-light);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.hdr-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.5px;text-transform:uppercase}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.role-sel{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:5px 9px;font-size:12px}
.role-sel label{color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.role-sel select{background:transparent;color:#fff;border:none;outline:none;font-weight:600}
.role-sel select option{color:var(--navy)}

/* TABS */
.tabs{background:var(--navy-mid);display:flex;overflow-x:auto;padding:0 8px}
.tab{color:rgba(255,255,255,.72);padding:12px 16px;font-size:13px;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;transition:all .12s}
.tab:hover{color:#fff}
.tab.active{color:var(--gold-light);border-bottom-color:var(--gold-light)}
.tab .pill{background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;border-radius:999px;padding:1px 6px;margin-left:5px}
.tab .pill.red{background:var(--red);color:#fff}

/* WRAP */
.wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px}
.sec{display:none}
.sec.active{display:block;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* CARDS */
.card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.card-h h3{font-size:18px}
.card-h p{color:var(--gray-600);font-size:12px;margin-top:3px}
.card-h .actions{display:flex;gap:6px;flex-wrap:wrap}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.kpi.g::before{background:var(--green-mid)}.kpi.r::before{background:var(--red)}.kpi.a::before{background:#f59e0b}.kpi.b::before{background:#3b82f6}
.kpi .l{font-size:10px;font-weight:700;letter-spacing:.7px;color:var(--gray-600);text-transform:uppercase}
.kpi .v{font-size:22px;font-weight:700;color:var(--navy);margin:6px 0 2px;font-variant-numeric:tabular-nums;font-family:'DM Serif Display',serif}
.kpi .s{font-size:11px;color:var(--gray-600)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--gray-300);background:#fff;color:var(--navy);font-weight:600;font-size:12.5px;transition:all .12s}
.btn:hover{border-color:var(--navy-light);transform:translateY(-1px)}
.btn.p{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.red{background:#fff;color:var(--red);border-color:#fecaca}
.btn.sm{padding:5px 10px;font-size:11.5px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.block{width:100%;justify-content:center}

/* FORM */
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fgrid .full{grid-column:1/-1}
.fld label{display:block;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--gray-600);text-transform:uppercase;margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;background:#fff}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,146,42,.16)}
.seg{display:flex;gap:0;border:1px solid var(--gray-300);border-radius:8px;overflow:hidden}
.seg button{flex:1;padding:9px;font-size:12.5px;font-weight:700;background:#fff;color:var(--gray-600)}
.seg button.on.inc{background:var(--green-pale);color:var(--green);box-shadow:inset 0 -3px 0 var(--green)}
.seg button.on.exp{background:var(--red-pale);color:var(--red);box-shadow:inset 0 -3px 0 var(--red)}

/* TABLE */
.twrap{overflow:auto;border:1px solid var(--gray-200);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--navy);color:#fff;text-align:left;padding:9px 10px;font-weight:600;font-size:11.5px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--gray-200);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover td{background:var(--cream)}
.num{text-align:right;font-variant-numeric:tabular-nums}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;border:1px solid transparent}
.bdg.inc{color:var(--green);background:var(--green-pale);border-color:var(--green-mid)}
.bdg.exp{color:var(--red);background:var(--red-pale);border-color:#fecaca}
.bdg.cash{color:var(--gold);background:var(--gold-pale);border-color:var(--gold-light)}
.bdg.bank{color:var(--blue);background:var(--blue-pale);border-color:#bfdbfe}
.bdg.upi{color:var(--purple);background:var(--purple-pale);border-color:#ddd6fe}
.bdg.card{color:var(--gray-600);background:var(--gray-100);border-color:var(--gray-300)}
.bdg.auto{color:var(--blue);background:var(--blue-pale);border-color:#bfdbfe}
.bdg.locked{color:#fff;background:var(--navy)}
.bdg.void{color:var(--gray-600);background:var(--gray-100);border-color:var(--gray-300);text-decoration:line-through}
.bdg.ok{color:var(--green);background:var(--green-pale);border-color:var(--green-mid)}
.bdg.warn{color:var(--amber);background:var(--amber-pale);border-color:#fed7aa}
.bdg.src{color:var(--purple);background:var(--purple-pale);border-color:#ddd6fe}

/* STATEMENT */
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.st-box{border:1px solid var(--gray-200);border-radius:8px;overflow:hidden}
.st-box .st-th{background:var(--navy-mid);color:#fff;padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.4px}
.st-row{display:flex;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--gray-200);font-size:12.5px}
.st-row:last-child{border-bottom:0}
.st-row.tot{background:var(--cream);font-weight:700;color:var(--navy)}
.st-row .d{color:var(--gray-600)}
.deno{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.deno-row{display:grid;grid-template-columns:60px 1fr 90px;gap:6px;align-items:center;font-size:12px}
.deno-row input{padding:6px 8px;border:1px solid var(--gray-300);border-radius:6px;text-align:center}
.recon{padding:14px;border-radius:8px;text-align:center;font-weight:700;margin-top:12px}
.recon.ok{background:var(--green-pale);color:var(--green);border:1px solid var(--green-mid)}
.recon.bad{background:var(--red-pale);color:var(--red);border:1px solid #fecaca}
.recon .big{font-size:24px;font-family:'DM Serif Display',serif;display:block;margin-top:4px}

/* BANNER */
.banner{padding:11px 14px;border-radius:8px;font-size:12.5px;font-weight:600;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.banner.warn{background:var(--amber-pale);color:var(--amber);border:1px solid #fed7aa}
.banner.info{background:var(--blue-pale);color:var(--blue);border:1px solid #bfdbfe}
.banner.lock{background:var(--gray-100);color:var(--gray-800);border:1px solid var(--gray-300)}
.banner.ok{background:var(--green-pale);color:var(--green);border:1px solid var(--green-mid)}

/* EMPTY */
.empty{padding:26px;text-align:center;color:var(--gray-600);font-size:12.5px;border:1px dashed var(--gray-300);border-radius:8px;background:var(--cream)}

/* MODAL */
.mbk{position:fixed;inset:0;background:rgba(13,35,64,.5);display:flex;align-items:center;justify-content:center;z-index:90;padding:16px}
.modal{background:#fff;border-radius:12px;max-width:440px;width:100%;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg)}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:17px}
.modal-b{padding:18px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:120;box-shadow:var(--shadow-lg);border-left:4px solid var(--gold);max-width:90vw}
.toast.ok{border-left-color:var(--green-mid)}.toast.err{border-left-color:var(--red)}.toast.warn{border-left-color:#f59e0b}

/* MISC */
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sp{flex:1}
.muted{color:var(--gray-600)}
.small{font-size:11px}
.gauge{height:7px;border-radius:999px;background:var(--gray-200);overflow:hidden;margin-top:6px}
.gauge .f{height:100%;background:linear-gradient(90deg,var(--green-mid),var(--gold))}
.gauge .f.over{background:linear-gradient(90deg,#f59e0b,var(--red))}
.flist{display:flex;flex-direction:column;gap:7px}
.fitem{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:9px 11px;border:1px solid var(--gray-200);border-radius:8px}
.fitem .ic{width:30px;height:30px;border-radius:7px;background:var(--gold-pale);color:var(--gold);display:grid;place-items:center;font-size:14px}
@media(max-width:760px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .fgrid{grid-template-columns:1fr}
  .st-grid{grid-template-columns:1fr}
  .deno{grid-template-columns:1fr}
  .wrap{padding:14px 10px 50px}
}
@media print{
  .hdr,.tabs,.card-h .actions,.btn,.role-sel{display:none!important}
  body{background:#fff}
  .sec{display:none!important}
  .sec.active{display:block!important}
  .card{box-shadow:none;border-color:#ccc;break-inside:avoid}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">₹</div>
  <div>
    <h1>Expense Manager</h1>
    <div class="sub">Central Financial Ledger</div>
  </div>
  <span class="hdr-badge" id="firmBadge">Saagar Traders</span>
  <div class="hdr-right">
    <div class="role-sel">
      <label>Role</label>
      <select id="roleSel" onchange="setRole(this.value)">
        <option value="cashier">Cashier (maker)</option>
        <option value="accounts">Accounts (checker)</option>
        <option value="owner">Owner (approver)</option>
      </select>
    </div>
    <span class="small muted" id="todayBadge"></span>
  </div>
</header>

<nav class="tabs" id="tabBar">
  <button class="tab active" data-sec="dash" onclick="go('dash')">Dashboard</button>
  <button class="tab" data-sec="ledger" onclick="go('ledger')">Ledger</button>
  <button class="tab" data-sec="stmt" onclick="go('stmt')">Cash Statement</button>
  <button class="tab" data-sec="petty" onclick="go('petty')">Petty Cash</button>
  <button class="tab" data-sec="vendors" onclick="go('vendors')">Vendors</button>
  <button class="tab" data-sec="budget" onclick="go('budget')">Budgets</button>
  <button class="tab" data-sec="sync" onclick="go('sync')">Cross-module <span class="pill" id="syncPill">0</span></button>
  <button class="tab" data-sec="close" onclick="go('close')">Month &amp; Tax</button>
  <button class="tab" data-sec="audit" onclick="go('audit')">Audit</button>
</nav>

<div class="wrap">
  <section class="sec active" id="sec-dash"><div id="dashC"></div></section>
  <section class="sec" id="sec-ledger"><div id="ledgerC"></div></section>
  <section class="sec" id="sec-stmt"><div id="stmtC"></div></section>
  <section class="sec" id="sec-petty"><div id="pettyC"></div></section>
  <section class="sec" id="sec-vendors"><div id="vendorsC"></div></section>
  <section class="sec" id="sec-budget"><div id="budgetC"></div></section>
  <section class="sec" id="sec-sync"><div id="syncC"></div></section>
  <section class="sec" id="sec-close"><div id="closeC"></div></section>
  <section class="sec" id="sec-audit"><div id="auditC"></div></section>
</div>

<div id="modalRoot"></div>
<div class="toast hide" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   EXPENSE MANAGER v2 — CENTRAL FINANCIAL LEDGER
   Saagar Traders / Gold Mart Group
   - gm_expenses is the single master ledger (income + expense)
   - tanishq_statements holds per-day reconciliation + lock state
   - Daily Cash Statement is AUTO-GENERATED from the ledger (locked rows)
   - Cross-module feeds: WSC / Payroll / Stock / QMS  →  Tax monthly feed
   Backward compatible: migrates existing gm_expenses & tanishq_statements.
   ═══════════════════════════════════════════════════════════════════════ */

/* ---------- storage ---------- */
var K = {
  exp:'gm_expenses', stmt:'tanishq_statements', role:'gm_role',
  vend:'gm_vendors', budg:'gm_budgets', audit:'gm_audit',
  set:'gm_settings', tax:'gm_tax_feed', petty:'gm_petty'
};
function L(k,fb){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch(e){ return fb; } }
function S(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ toast('Storage error: '+e.message,'err'); } }

/* ---------- constants ---------- */
var EXP_CATS=['Inventory','Rent','Salary','Utilities','Marketing','Bank Charges','Transport','Repairs','Statutory','Miscellaneous'];
var INC_CATS=['Retail Sale','Service Income','Other Income'];
var MODES=['Cash','Bank','UPI','Card'];
var DENOMS=[2000,500,200,100,50,20,10,5,2,1];
var REASONS=['Cash shortage correction','Duplicate entry','Missed receipt','Wrong payment mode','Voucher correction','Other'];

/* ---------- util ---------- */
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function p2(n){ return (n<10?'0':'')+n; }
function ym(s){ return (s||todayStr()).slice(0,7); }
function uid(pfx){ return (pfx||'e')+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function nINR(n){ if(n==null||isNaN(n))return '₹0'; return '₹'+Math.round(n).toLocaleString('en-IN'); }
function num(v){ var n=parseFloat(v); return isNaN(n)?0:n; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function prevDay(s){ var d=new Date(s+'T00:00:00'); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function toast(m,k){ var t=document.getElementById('toast'); t.textContent=m; t.className='toast '+(k||''); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.add('hide');},2600); }
function role(){ return localStorage.getItem(K.role)||'cashier'; }
function setRole(r){ localStorage.setItem(K.role,r); render(); toast('Role: '+r,'ok'); }
function can(act){
  var r=role();
  if(act==='entry') return true;
  if(act==='void') return r==='cashier'||r==='accounts'||r==='owner';
  if(act==='close') return r==='cashier'||r==='owner';
  if(act==='approve') return r==='accounts'||r==='owner';
  if(act==='reopen') return r==='owner';
  if(act==='monthlock') return r==='owner';
  return false;
}

/* ---------- audit ---------- */
function audit(action,detail){
  var a=L(K.audit,[]);
  a.unshift({id:uid('a'),at:new Date().toISOString(),by:role(),action:action,detail:detail||''});
  if(a.length>800) a=a.slice(0,800);
  S(K.audit,a);
}

/* ---------- migration / normalization ---------- */
function normEntry(e){
  e=e||{};
  var mode=e.mode||e.paymentMode||'Cash';
  if(MODES.indexOf(mode)<0) mode=(/cash/i.test(mode)?'Cash':/upi/i.test(mode)?'UPI':/card/i.test(mode)?'Card':'Bank');
  var type=(e.type||'expense').toLowerCase()==='income'?'income':'expense';
  var src=e.source||(e.sourceStatementId?'statement':null);
  return {
    id:e.id||uid('e'),
    type:type,
    date:(e.date||todayStr()).slice(0,10),
    amount:num(e.amount),
    category:e.category||(type==='income'?'Other Income':'Miscellaneous'),
    mode:mode,
    vendor:e.vendor||'',
    description:e.description||e.desc||e.d||'',
    notes:e.notes||'',
    billPhoto:e.billPhoto||null,
    source:src,                                  // null|wsc|payroll|stock|qms|statement|petty
    sourceRef:e.sourceRef||e.sourceStatementId||null,
    void:!!e.void, voidReason:e.voidReason||null,
    createdAt:e.createdAt||new Date().toISOString(),
    createdBy:e.createdBy||'legacy',
    editLog:Array.isArray(e.editLog)?e.editLog:[]
  };
}
function getLedger(){ return L(K.exp,[]).map(normEntry); }
function saveLedger(a){ S(K.exp,a.map(normEntry)); }

function migrateOnce(){
  if(L(K.set,{}).migratedV2) return;
  var raw=L(K.exp,[]);
  if(raw.length) saveLedger(raw.map(normEntry));
  var st=L(K.stmt,{}), changed=false;
  Object.keys(st).forEach(function(key){
    var s=st[key];
    if(s && s.date && key!==s.date){ st[s.date]=migrateStmt(s); changed=true; }
    else if(s && s.date){ st[key]=migrateStmt(s); }
  });
  if(changed||Object.keys(st).length) S(K.stmt,st);
  var set=L(K.set,{}); set.migratedV2=true; set.gstRate=set.gstRate||0; S(K.set,set);
  audit('system.migrate','Migrated to v2 central ledger model');
}
function migrateStmt(s){
  return {
    date:s.date,
    openingBalance:num(s.openingBalance),
    physDeno:s.physDeno||{}, bankDeno:s.bankDeno||{},
    closed:!!s.closed, closedAt:s.closedAt||null, closedBy:s.closedBy||null,
    approved:!!s.approved, approvedBy:s.approvedBy||null, approvedAt:s.approvedAt||null,
    reopenReason:s.reopenReason||null, mismatchReason:s.mismatchReason||null,
    monthLocked:!!s.monthLocked
  };
}
function getStmt(date){
  var st=L(K.stmt,{});
  return st[date]||{date:date,openingBalance:null,physDeno:{},bankDeno:{},closed:false,closedAt:null,closedBy:null,approved:false,approvedBy:null,approvedAt:null,reopenReason:null,mismatchReason:null,monthLocked:false};
}
function saveStmt(s){ var st=L(K.stmt,{}); st[s.date]=s; S(K.stmt,st); }

/* ---------- cash statement computation (the core fix) ---------- */
function denoTotal(d){ return DENOMS.reduce(function(t,v){ return t+(num(d&&d[v])*v); },0); }

function computeDay(date){
  // All non-void ledger entries for the date
  var rows=getLedger().filter(function(e){ return e.date===date && !e.void; });
  var cashIn=0,cashOut=0, bankIn=0,bankOut=0, incTot=0,expTot=0;
  rows.forEach(function(e){
    var isCash=e.mode==='Cash';
    if(e.type==='income'){ incTot+=e.amount; if(isCash) cashIn+=e.amount; else bankIn+=e.amount; }
    else { expTot+=e.amount; if(isCash) cashOut+=e.amount; else bankOut+=e.amount; }
  });
  // Opening = carry-forward from previous day's counted closing
  var prev=prevDay(date), ps=getStmt(prev), opening;
  if(ps.closed){ opening=Math.max(denoTotal(ps.physDeno)-denoTotal(ps.bankDeno),0); }
  else { var sNow=getStmt(date); opening=(sNow.openingBalance!=null)?sNow.openingBalance:0; }
  var expectedClosing = opening + cashIn - cashOut;
  return {date:date,rows:rows,opening:opening,cashIn:cashIn,cashOut:cashOut,
          bankIn:bankIn,bankOut:bankOut,incTot:incTot,expTot:expTot,
          net:incTot-expTot,expectedClosing:expectedClosing,prevClosed:ps.closed};
}

function readPhoto(cb){
  var f=document.getElementById('f_photo'); if(!f||!f.files||!f.files[0]){ cb(null); return; }
  var img=f.files[0]; if(img.size>4*1024*1024){ toast('Photo too large (max 4MB)','warn'); cb(null); return; }
  var r=new FileReader();
  r.onload=function(){
    var i=new Image();
    i.onload=function(){
      var sc=Math.min(1,1000/i.width), c=document.createElement('canvas');
      c.width=i.width*sc; c.height=i.height*sc;
      c.getContext('2d').drawImage(i,0,0,c.width,c.height);
      cb(c.toDataURL('image/jpeg',0.7));
    };
    i.onerror=function(){ cb(null); };
    i.src=r.result;
  };
  r.onerror=function(){ cb(null); };
  r.readAsDataURL(img);
}
function addEntry(){
  var type=window.__et||'expense';
  var date=val('f_date'), amt=num(val('f_amt')), cat=val('f_cat'), mode=val('f_mode'),
      vendor=val('f_vendor').trim(), desc=val('f_desc').trim(), notes=val('f_notes').trim();
  if(amt<=0){ toast('Enter an amount greater than 0','err'); return; }
  if(!desc){ toast('Description is required','err'); return; }
  if(getStmt(date).closed){ toast('That day’s cash statement is locked. Owner must reopen it first.','err'); return; }
  var led=getLedger();
  var dup=led.find(function(e){ return !e.void && e.date===date && Math.abs(e.amount-amt)<0.01 && e.description.toLowerCase()===desc.toLowerCase(); });
  if(dup && !confirm('A similar entry already exists for '+date+' ('+nINR(amt)+' — '+desc+'). Save anyway?')) return;
  readPhoto(function(photo){
    var e=normEntry({id:uid('e'),type:type,date:date,amount:amt,category:cat,mode:mode,vendor:vendor,description:desc,notes:notes,billPhoto:photo,source:null,createdBy:role()});
    led.push(e); saveLedger(led);
    if(vendor){ var vs=L(K.vend,[]); if(!vs.find(function(v){return v.name.toLowerCase()===vendor.toLowerCase();})){ vs.push({name:vendor}); S(K.vend,vs); } }
    audit('ledger.create',type+' '+nINR(amt)+' · '+cat+' · '+date+' · '+desc);
    toast('Saved — also reflected in '+date+' cash statement','ok');
    renderLedger();
  });
}

}
function finishClose(st,d){
  st.openingBalance=d.opening; st.closed=true; st.closedAt=new Date().toISOString(); st.closedBy=role(); st.approved=false;
  saveStmt(st);
  audit('stmt.close',SD+' · expected '+nINR(d.expectedClosing)+' · counted '+nINR(denoTotal(st.physDeno))+(st.mismatchReason?(' · '+st.mismatchReason):''));
  toast('Day '+SD+' closed & locked','ok'); renderStmt();
}
function approveDay(){
  var st=getStmt(SD); if(!st.closed){ toast('Close the day first','err'); return; }
  if(role()==='cashier'){ toast('Cashier cannot approve own day','err'); return; }
  st.approved=true; st.approvedBy=role(); st.approvedAt=new Date().toISOString(); saveStmt(st);
  audit('stmt.approve',SD+' approved'); toast('Day approved','ok'); renderStmt();
}
function reopenDay(){
  if(!can('reopen')){ toast('Only Owner can reopen','err'); return; }
  var st=getStmt(SD);
  modal('Reopen locked day',
    fld('Reason','<select id="ro_r">'+REASONS.map(function(r){return '<option>'+r+'</option>';}).join('')+'</select>')+
    fld('Detail','<input id="ro_n" placeholder="audit note">','full'),
    function(){
      st.closed=false; st.approved=false; st.reopenReason=val('ro_r')+(val('ro_n')?(' — '+val('ro_n')):'');
      saveStmt(st); audit('stmt.reopen',SD+' · '+st.reopenReason); toast('Day reopened','warn'); renderStmt(); return true;
    });
}

/* ═══════════════ PETTY CASH ═══════════════ */
function renderPetty(){
  var pt=L(K.petty,{float:0,history:[]});
  var spent=getLedger().filter(function(e){return e.source==='petty'&&!e.void;}).reduce(function(s,e){return s+e.amount;},0);
  document.getElementById('pettyC').innerHTML=
  '<div class="card"><div class="card-h"><div><h3>Petty cash float</h3><p>Small-cash bucket. Disbursements post to the ledger as Cash expenses.</p></div></div>'+
   '<div class="kgrid"><div class="kpi b"><div class="l">Float set</div><div class="v">'+nINR(pt.float)+'</div></div>'+
   '<div class="kpi r"><div class="l">Disbursed</div><div class="v">'+nINR(spent)+'</div></div>'+
   '<div class="kpi g"><div class="l">Balance</div><div class="v">'+nINR(pt.float-spent)+'</div></div>'+
   '<div class="kpi a"><div class="l">Status</div><div class="v" style="font-size:15px">'+((pt.float-spent)<0.15*pt.float&&pt.float?'Replenish soon':'Healthy')+'</div></div></div>'+
   '<div class="fgrid" style="margin-top:6px">'+
    fld('Set / top-up float (₹)','<input id="pt_f" type="number" min="0" placeholder="e.g. 5000">')+
    fld('','<button class="btn p block" style="margin-top:22px" onclick="setFloat()">Set / add float</button>')+
   '</div></div>'+
  '<div class="card"><div class="card-h"><div><h3>Quick petty disbursement</h3></div></div>'+
   '<div class="fgrid">'+
    fld('Amount (₹)','<input id="pt_a" type="number" min="0">')+
    fld('Category','<select id="pt_c">'+EXP_CATS.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select>')+
    fld('For','<input id="pt_d" placeholder="tea / auto / sundry">','full')+
   '</div><button class="btn p" style="margin-top:12px" onclick="pettyOut()">Record disbursement</button></div>';
}
function setFloat(){ var pt=L(K.petty,{float:0,history:[]}); var add=num(val('pt_f')); if(add<=0){toast('Enter amount','err');return;} pt.float+=add; pt.history.push({at:new Date().toISOString(),by:role(),add:add}); S(K.petty,pt); audit('petty.float','+'+nINR(add)); toast('Float updated','ok'); renderPetty(); }
function pettyOut(){
  var a=num(val('pt_a')); if(a<=0){toast('Enter amount','err');return;}
  var led=getLedger();
  led.push(normEntry({id:uid('e'),type:'expense',date:todayStr(),amount:a,category:val('pt_c'),mode:'Cash',description:'Petty: '+(val('pt_d')||'sundry'),source:'petty',sourceRef:uid('pty'),createdBy:role()}));
  saveLedger(led); audit('petty.out',nINR(a)+' · '+val('pt_d')); toast('Posted to ledger (Cash expense)','ok'); renderPetty();
}

/* ═══════════════ VENDORS ═══════════════ */
function renderVendors(){
  var vs=L(K.vend,[]), led=getLedger().filter(function(e){return !e.void;});
  var spend={}; led.forEach(function(e){ if(e.vendor) spend[e.vendor]=(spend[e.vendor]||0)+(e.type==='expense'?e.amount:0); });
  document.getElementById('vendorsC').innerHTML=
  '<div class="card"><div class="card-h"><div><h3>Vendors / payees</h3><p>Used for entry auto-complete and spend reports.</p></div></div>'+
   '<div class="row"><input id="vn" placeholder="vendor name" style="padding:9px 11px;border:1px solid var(--gray-300);border-radius:8px;flex:1"><button class="btn p" onclick="addVendor()">Add</button></div>'+
   '<div class="twrap" style="margin-top:14px"><table><thead><tr><th>Vendor</th><th class="num">Total spend</th><th class="num">Entries</th><th></th></tr></thead><tbody>'+
    (vs.length?vs.map(function(v){
      var cnt=led.filter(function(e){return e.vendor===v.name;}).length;
      return '<tr><td>'+esc(v.name)+'</td><td class="num">'+nINR(spend[v.name]||0)+'</td><td class="num">'+cnt+'</td><td class="num"><button class="btn xs red" onclick="delVendor(\''+esc(v.name).replace(/'/g,"")+'\')">Remove</button></td></tr>';
    }).join(''):'<tr><td colspan="4"><div class="empty">No vendors yet. They are also auto-added when you type a payee on an entry.</div></td></tr>')+
   '</tbody></table></div></div>';
}
function addVendor(){ var n=val('vn').trim(); if(!n)return; var vs=L(K.vend,[]); if(vs.find(function(v){return v.name.toLowerCase()===n.toLowerCase();})){toast('Already exists','warn');return;} vs.push({name:n}); S(K.vend,vs); audit('vendor.add',n); renderVendors(); }
function delVendor(n){ var vs=L(K.vend,[]).filter(function(v){return v.name!==n;}); S(K.vend,vs); audit('vendor.remove',n); renderVendors(); }

/* ═══════════════ BUDGETS ═══════════════ */
function renderBudget(){
  var m=ym(todayStr()), b=L(K.budg,{}), bm=b[m]||{};
  var led=getLedger().filter(function(e){return !e.void&&e.type==='expense'&&e.date.slice(0,7)===m;});
  var act={}; led.forEach(function(e){ act[e.category]=(act[e.category]||0)+e.amount; });
  document.getElementById('budgetC').innerHTML=
  '<div class="card"><div class="card-h"><div><h3>Monthly budgets — '+m+'</h3><p>Set a cap per expense head; actuals tracked live from the ledger.</p></div></div>'+
   '<div class="twrap"><table><thead><tr><th>Category</th><th class="num">Budget</th><th class="num">Actual</th><th class="num">Used</th><th>Status</th></tr></thead><tbody>'+
    EXP_CATS.map(function(c){
      var bg=num(bm[c]), ac=act[c]||0, pct=bg?Math.round(ac/bg*100):0;
      return '<tr><td>'+c+'</td>'+
       '<td class="num"><input type="number" min="0" value="'+(bm[c]||'')+'" style="width:100px;padding:5px;border:1px solid var(--gray-300);border-radius:6px;text-align:right" onchange="setBudget(\''+c+'\',this.value)"></td>'+
       '<td class="num">'+nINR(ac)+'</td>'+
       '<td class="num">'+(bg?pct+'%':'—')+'<div class="gauge"><div class="f '+(pct>100?'over':'')+'" style="width:'+Math.min(pct,100)+'%"></div></div></td>'+
       '<td>'+(!bg?'<span class="muted small">no budget</span>':pct>100?'<span class="bdg exp">over '+nINR(ac-bg)+'</span>':pct>=85?'<span class="bdg warn">near limit</span>':'<span class="bdg ok">ok</span>')+'</td></tr>';
    }).join('')+
   '</tbody></table></div></div>';
}
function setBudget(c,v){ var m=ym(todayStr()),b=L(K.budg,{}); b[m]=b[m]||{}; b[m][c]=num(v); S(K.budg,b); audit('budget.set',m+' · '+c+' = '+nINR(num(v))); renderBudget(); }

/* ═══════════════ CROSS-MODULE FEED ═══════════════ */
function feedItems(){
  var items=[]; var posted={}; getLedger().forEach(function(e){ if(e.sourceRef) posted[e.sourceRef]=true; });
  // WSC — saagar_wsf_v2 closed cases → income
  try{ var w=L('saagar_wsf_v2',[]); if(Array.isArray(w)) w.forEach(function(c){
    if((c.status||'')==='closed'){ var ref='wsc_'+c.id, amt=num(c.estTotal||c.delivery&&c.delivery.amount);
      if(amt>0) items.push({src:'wsc',ref:ref,type:'income',date:(c.closedAt||todayStr()).slice(0,10),amount:amt,category:'Service Income',mode:((c.delivery&&c.delivery.payMode)||'Cash'),desc:'WSC '+(c.custName||'service')+' '+(c.brand||''),posted:!!posted[ref]});
    }});}catch(e){}
  // Payroll — payroll_suite_v1_2026 → monthly expense per firm
  try{ var pb=L('payroll_suite_v1_2026',null);
    if(pb&&pb.meta&&Array.isArray(pb.rows)){ var byFirm={}; pb.rows.forEach(function(r){ var f=(r.firm||'GM'); byFirm[f]=(byFirm[f]||0)+num(r.gross||r.salaryAmount); });
      Object.keys(byFirm).forEach(function(f){ var ref='pay_'+pb.meta.year+'_'+pb.meta.month+'_'+f, dt=pb.meta.year+'-'+p2(pb.meta.month||1)+'-28';
        items.push({src:'payroll',ref:ref,type:'expense',date:dt,amount:byFirm[f],category:'Salary',mode:'Bank',desc:'Payroll '+f+' M'+pb.meta.month+'/'+pb.meta.year,posted:!!posted[ref]});
      });}}catch(e){}
  // Stock — saagar_stock_<store>_<date> GRN → expense
  try{ for(var i=0;i<localStorage.length;i++){ var key=localStorage.key(i);
      var mm=key&&key.match(/^saagar_stock_(WLMHW|HEMW)_(\d{4}-\d{2}-\d{2})$/);
      if(mm){ var blob=L(key,{}),grn=0; Object.keys(blob).forEach(function(bk){ var row=blob[bk]; if(row&&row.mov&&row.mov.grn) grn+=num(row.mov.grn); });
        if(grn>0){ var ref='grn_'+mm[1]+'_'+mm[2]; items.push({src:'stock',ref:ref,type:'expense',date:mm[2],amount:grn,category:'Inventory',mode:'Bank',desc:'GRN cost '+mm[1]+' '+mm[2],posted:!!posted[ref]}); } } } }catch(e){}
  // QMS — retail_queue_management_v1 purchases → income (usually absent in this APK)
  try{ var q=L('retail_queue_management_v1',null);
    if(q&&Array.isArray(q.customers)) q.customers.forEach(function(c){
      if((c.outcome||'').toLowerCase()==='purchase'&&num(c.amount)>0){ var ref='qms_'+(c.id||c.mobile);
        items.push({src:'qms',ref:ref,type:'income',date:((c.walkInTime||todayStr())+'').slice(0,10),amount:num(c.amount),category:'Retail Sale',mode:'Cash',desc:'QMS sale '+(c.name||c.billNo||''),posted:!!posted[ref]});
      }});}catch(e){}
  return items;
}
function pendingSyncCount(){ try{ return feedItems().filter(function(i){return !i.posted;}).length; }catch(e){ return 0; } }
function renderSync(){
  var items=feedItems(), pending=items.filter(function(i){return !i.posted;});
  var bySrc={wsc:[],payroll:[],stock:[],qms:[]}; items.forEach(function(i){ bySrc[i.src].push(i); });
  function block(src,title,note){
    var arr=bySrc[src], pend=arr.filter(function(i){return !i.posted;});
    return '<div class="card"><div class="card-h"><div><h3>'+title+'</h3><p>'+note+'</p></div>'+
      '<div class="actions">'+(pend.length?'<button class="btn sm green" onclick="postSrc(\''+src+'\')">Post '+pend.length+' to ledger</button>':'')+'</div></div>'+
      (arr.length?'<div class="twrap"><table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th class="num">Amount</th><th>Mode</th><th>State</th></tr></thead><tbody>'+
        arr.slice(0,40).map(function(i){return '<tr><td>'+i.date+'</td><td><span class="bdg '+(i.type==='income'?'inc':'exp')+'">'+i.type+'</span></td><td>'+esc(i.desc)+'</td><td class="num">'+nINR(i.amount)+'</td><td><span class="bdg '+i.mode.toLowerCase()+'">'+i.mode+'</span></td><td>'+(i.posted?'<span class="bdg ok">posted</span>':'<span class="bdg warn">pending</span>')+'</td></tr>';}).join('')+
        '</tbody></table></div>':'<div class="empty">No '+src.toUpperCase()+' data found in this device. '+(src==='qms'?'QMS is not part of this 7-module build — this feed activates automatically if QMS data ever exists here.':'Use the '+src.toUpperCase()+' module first.')+'</div>')+
    '</div>';
  }
  document.getElementById('syncC').innerHTML=
   '<div class="banner info">⤢ <div>Expense Manager is the central ledger. It reads other modules in this app and posts their money movements here once — de-duplicated by source reference. <b>'+pending.length+'</b> item(s) pending.</div></div>'+
   (pending.length?'<div class="card"><button class="btn p" onclick="postSrc(\'all\')">Post all '+pending.length+' pending items to ledger</button></div>':'')+
   block('wsc','Watch Service Centre → Income','Closed/delivered service cases become service income.')+
   block('payroll','Payroll Suite → Expense','Monthly gross per firm becomes a salary expense.')+
   block('stock','Daily Stock Register → Expense','GRN (goods received) value becomes an inventory cost.')+
   block('qms','Queue Management → Income','Confirmed walk-in sales become retail income.');
}
function postSrc(src){
  var items=feedItems().filter(function(i){return !i.posted&&(src==='all'||i.src===src);});
  if(!items.length){ toast('Nothing to post','warn'); return; }
  var led=getLedger(); var n=0;
  items.forEach(function(i){
    led.push(normEntry({id:uid('e'),type:i.type,date:i.date,amount:i.amount,category:i.category,mode:i.mode,description:i.desc,source:i.src,sourceRef:i.ref,createdBy:'sync:'+role()}));
    n++;
  });
  saveLedger(led); audit('sync.post',n+' item(s) from '+src); toast(n+' entr'+(n>1?'ies':'y')+' posted to ledger','ok'); render();
}

/* ═══════════════ MONTH CLOSE & TAX FEED ═══════════════ */
var CM=ym(todayStr());
function renderClose(){
  var led=getLedger().filter(function(e){return !e.void&&e.date.slice(0,7)===CM;});
  var inc=led.filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amount;},0);
  var exp=led.filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amount;},0);
  var byCat={}; led.forEach(function(e){ var k=(e.type==='income'?'＋ ':'－ ')+e.category; byCat[k]=(byCat[k]||0)+e.amount; });
  var set=L(K.set,{}), gst=num(set.gstRate);
  var feed=L(K.tax,{}); var saved=feed[CM];
  var unappr=daysAwaitingApproval();
  document.getElementById('closeC').innerHTML=
  '<div class="card"><div class="card-h"><div><h3>Month close &amp; Tax feed</h3><p>Lock the month and generate a summary for Tax Compliance / your CA.</p></div>'+
   '<div class="actions"><input type="month" value="'+CM+'" onchange="CM=this.value;renderClose()" style="padding:7px;border:1px solid var(--gray-300);border-radius:7px"></div></div>'+
   '<div class="kgrid"><div class="kpi g"><div class="l">Income</div><div class="v">'+nINR(inc)+'</div></div>'+
    '<div class="kpi r"><div class="l">Expense</div><div class="v">'+nINR(exp)+'</div></div>'+
    '<div class="kpi '+(inc-exp<0?'r':'g')+'"><div class="l">Net P&L</div><div class="v">'+nINR(inc-exp)+'</div></div>'+
    '<div class="kpi b"><div class="l">Entries</div><div class="v">'+led.length+'</div></div></div>'+
   (unappr.length?'<div class="banner warn">⚠ <div>'+unappr.length+' day(s) in this period are closed but not approved by a checker: '+unappr.join(', ')+'</div></div>':'')+
   '<div class="fgrid"><div class="fld"><label>GST rate for estimate (%)</label><input type="number" id="gstr" value="'+gst+'" onchange="saveGst(this.value)"></div></div>'+
   '<div class="twrap" style="margin-top:6px"><table><thead><tr><th>Head</th><th class="num">Amount</th></tr></thead><tbody>'+
     Object.keys(byCat).sort().map(function(k){return '<tr><td>'+esc(k)+'</td><td class="num">'+nINR(byCat[k])+'</td></tr>';}).join('')+
     '<tr><td><b>Estimated GST on income ('+gst+'%)</b></td><td class="num"><b>'+nINR(inc*gst/100)+'</b></td></tr>'+
   '</tbody></table></div>'+
   '<div class="row" style="margin-top:14px">'+
     (can('monthlock')?'<button class="btn p" onclick="genTaxFeed()">Generate &amp; lock Tax feed for '+CM+'</button>':'<span class="small muted">Only Owner can lock the month / generate the tax feed.</span>')+
     '<button class="btn sm" onclick="exportMonthCSV()">⇩ Month CSV</button></div>'+
   (saved?'<div class="banner ok" style="margin-top:14px">✔ <div>Tax feed generated '+ (saved.generatedAt||'').slice(0,16).replace('T',' ') +' by '+saved.by+' — Income '+nINR(saved.income)+', Expense '+nINR(saved.expense)+', GST est. '+nINR(saved.gstEstimate)+'. Stored for Tax Compliance under <code>gm_tax_feed['+CM+']</code>.</div></div>':'')+
  '</div>';
}
function saveGst(v){ var s=L(K.set,{}); s.gstRate=num(v); S(K.set,s); }
function genTaxFeed(){
  if(!can('monthlock')){ toast('Owner only','err'); return; }
  var led=getLedger().filter(function(e){return !e.void&&e.date.slice(0,7)===CM;});
  var inc=led.filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amount;},0);
  var exp=led.filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amount;},0);
  var gst=num(L(K.set,{}).gstRate);
  var byCat={}; led.forEach(function(e){ byCat[e.type+':'+e.category]=(byCat[e.type+':'+e.category]||0)+e.amount; });
  var feed=L(K.tax,{});
  feed[CM]={month:CM,income:inc,expense:exp,net:inc-exp,gstRate:gst,gstEstimate:inc*gst/100,byCategory:byCat,generatedAt:new Date().toISOString(),by:role()};
  S(K.tax,feed);
  // mark days of month locked
  var st=L(K.stmt,{}); Object.keys(st).forEach(function(dk){ if(dk.slice(0,7)===CM){ st[dk].monthLocked=true; } }); S(K.stmt,st);
  audit('month.lock',CM+' tax feed generated; income '+nINR(inc)+' expense '+nINR(exp));
  toast('Tax feed generated & month locked','ok'); renderClose();
}
function exportMonthCSV(){
  var rows=[['Date','Type','Category','Mode','Vendor','Description','Amount','Source']];
  getLedger().filter(function(e){return !e.void&&e.date.slice(0,7)===CM;}).sort(function(a,b){return a.date.localeCompare(b.date);})
    .forEach(function(e){ rows.push([e.date,e.type,e.category,e.mode,e.vendor,e.description,e.amount,e.source||'manual']); });
  dlCSV('expense_month_'+CM+'.csv',rows);
}
function daysAwaitingApproval(){
  var st=L(K.stmt,{}); return Object.keys(st).filter(function(d){ return st[d].closed && !st[d].approved; }).sort();
}

/* ═══════════════ AUDIT ═══════════════ */
function renderAudit(){
  var a=L(K.audit,[]);
  document.getElementById('auditC').innerHTML=
  '<div class="card"><div class="card-h"><div><h3>Audit trail</h3><p>'+a.length+' event(s). Every create / edit / void / close / reopen / sync / month-lock.</p></div>'+
   '<div class="actions"><button class="btn sm" onclick="exportAuditCSV()">⇩ CSV</button></div></div>'+
   (a.length?'<div class="twrap"><table><thead><tr><th>When</th><th>Role</th><th>Action</th><th>Detail</th></tr></thead><tbody>'+
     a.slice(0,300).map(function(x){return '<tr><td class="small">'+(x.at||'').slice(0,16).replace('T',' ')+'</td><td><span class="bdg src">'+esc(x.by)+'</span></td><td>'+esc(x.action)+'</td><td class="small">'+esc(x.detail)+'</td></tr>';}).join('')+
     '</tbody></table></div>':'<div class="empty">No audit events yet.</div>')+
  '</div>';
}
function exportAuditCSV(){ var rows=[['When','Role','Action','Detail']]; L(K.audit,[]).forEach(function(x){rows.push([x.at,x.by,x.action,x.detail]);}); dlCSV('expense_audit_'+todayStr()+'.csv',rows); }

/* ═══════════════ MODAL ═══════════════ */
function modal(title,bodyHtml,onOk){
  var r=document.getElementById('modalRoot');
  r.innerHTML='<div class="mbk" id="mbk"><div class="modal"><div class="modal-h"><h3>'+esc(title)+'</h3><button class="btn xs" onclick="closeModal()">✕</button></div><div class="modal-b">'+bodyHtml+'<div class="row" style="margin-top:16px;justify-content:flex-end"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn p" id="mok">Confirm</button></div></div></div></div>';
  document.getElementById('mok').onclick=function(){ if(onOk()!==false) closeModal(); };
  document.getElementById('mbk').addEventListener('click',function(e){ if(e.target.id==='mbk') closeModal(); });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

migrateOnce();
render();
window.addEventListener('storage',function(){ render(); });
