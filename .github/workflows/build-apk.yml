name: Build Saagar Control Centre APK

# Builds the offline Android APK on GitHub's servers.
# Runs automatically on every upload/change, and can be run manually
# from the Actions tab ("Run workflow"). The finished APK is published
# both as a downloadable Release and as a build artifact.

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Patch Android project (V5 build 2.1 — version bump + offline hygiene)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          GR=android/app/build.gradle
          # Remove unused INTERNET permission (app is fully offline) — BUILD_NOTES step 2
          sed -i '/android.permission.INTERNET/d' "$MF" || true
          # Bump version — BUILD_NOTES step 3
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 5/' "$GR" || true
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "2.1"/' "$GR" || true
          echo "----- AndroidManifest permissions -----"
          grep -n "uses-permission" "$MF" || echo "(no uses-permission lines — INTERNET removed)"
          echo "----- versioning -----"
          grep -nE "versionCode|versionName" "$GR" || true
          # Disable Android force-dark so WebView cannot invert module text (API 29-32;
          # API 33+ is handled by CSS color-scheme:light). Patch every values*/styles.xml.
          for SX in $(find android/app/src/main/res -name styles.xml); do
            if ! grep -q 'android:forceDarkAllowed' "$SX"; then
              sed -i -E '0,/<style [^>]*>/s//&\n        <item name="android:forceDarkAllowed">false<\/item>/' "$SX" || true
            fi
            echo "----- $SX -----"; grep -n 'forceDarkAllowed' "$SX" || echo "(forceDarkAllowed not set in $SX)"
          done

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "out/SaagarControlCentre-v5-build2.1-$(date +%Y%m%d).apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/SaagarControlCentre-latest.apk
          ls -lh out

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaagarControlCentre-APK
          path: out/*.apk
          retention-days: 90

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Saagar Control Centre - V5 (build 2.1) - CLEAN (empty, real-data ready)"
          body: |
            Fully offline Android build - Control Centre **V5 shell, build 2.1 (CLEAN)**.

            This is a **clean, empty production build** - it starts with NO data, ready for your
            real shop data. The SQLite-primary storage engine is ON (no ~5 MB cap), plus this
            release's performance work for large datasets:
            - Much faster once a lot of data builds up (fixed the slowdown that grew with months
              of entries - large key scans are no longer O(n^2)).
            - Smoother scrolling in long lists (the Expense ledger now shows the 200 most-recent
              rows with a "filter to narrow" notice instead of painting thousands at once).
            - The Home dashboard no longer re-parses the big Queue blob on every refresh.
            - Expense bill photos stored as separate files (kept out of the database).

            A separate **1-year test build** (pre-loaded with a full year of dummy data) is on its
            own release - use it to feel the speed/scrolling at scale before trusting this build
            with real data.

            Backups: Settings -> Backup / Restore as usual. To roll back, reinstall a previous
            build from this release's asset history.

            Download **SaagarControlCentre-latest.apk** below, copy it to the phone, and tap
            to install (allow "install from unknown sources").
          files: out/*.apk
          make_latest: true
