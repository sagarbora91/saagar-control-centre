name: Build Saagar Control Centre APK

# Builds the offline Android APK on GitHub's servers.
# Runs automatically on every upload/change, and can be run manually
# from the Actions tab ("Run workflow"). The finished APK is published
# both as a downloadable Release and as a build artifact.

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Patch Android project (V5 build 2.5 — version bump + offline hygiene)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          GR=android/app/build.gradle
          # Remove unused INTERNET permission (app is fully offline) — BUILD_NOTES step 2
          sed -i '/android.permission.INTERNET/d' "$MF" || true
          # Bump version — BUILD_NOTES step 3
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 9/' "$GR" || true
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "2.5"/' "$GR" || true
          echo "----- AndroidManifest permissions -----"
          grep -n "uses-permission" "$MF" || echo "(no uses-permission lines — INTERNET removed)"
          echo "----- versioning -----"
          grep -nE "versionCode|versionName" "$GR" || true
          # Disable Android force-dark so WebView cannot invert module text (API 29-32;
          # API 33+ is handled by CSS color-scheme:light). Patch every values*/styles.xml.
          for SX in $(find android/app/src/main/res -name styles.xml); do
            if ! grep -q 'android:forceDarkAllowed' "$SX"; then
              sed -i -E '0,/<style [^>]*>/s//&\n        <item name="android:forceDarkAllowed">false<\/item>/' "$SX" || true
            fi
            echo "----- $SX -----"; grep -n 'forceDarkAllowed' "$SX" || echo "(forceDarkAllowed not set in $SX)"
          done

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "out/SaagarControlCentre-v5-build2.5-$(date +%Y%m%d).apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/SaagarControlCentre-latest.apk
          ls -lh out

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaagarControlCentre-APK
          path: out/*.apk
          retention-days: 90

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Saagar Control Centre - V5 (build 2.5) - CLEAN (redesigned Reports)"
          body: |
            Fully offline Android build - Control Centre **V5 shell, build 2.5 (CLEAN)**.

            This is a **clean, empty production build** - it starts with NO data, ready for your
            real shop data. The SQLite-primary storage engine is ON (no ~5 MB cap).

            **New in 2.5 - redesigned Reports (same reports, brand-new screen).** The report list and the
            in-app report dashboard were rebuilt for one-handed phone use - the report PDFs themselves are
            unchanged:
            - The "Generate Report" picker is now a full-screen sheet with big tap rows, grouped by area,
              a search box, a < date > stepper, and your recently-used reports pinned on top.
            - The in-app Reports tab gets the same search + period stepper (kept in thumb reach), brand
              serif numerals on the KPI tiles, and a "PDF" button on every card to send that report.
            - Nothing about how a report is calculated changed (verified: all 16 reports still generate
              byte-identical PDFs).

            **Build 2.4 - fixes from the full 1-year function audit:**
            - Service reports now use the real intake date + credit the delivering technician.
            - Tax compliance due-dates no longer land one day early (timezone fix).
            - Cash-in-hand now carries forward across closed-gap days (Sundays/holidays) instead of resetting to 0.
            - Staff can record both a morning and an afternoon half-day on the same date.
            - Daily Staff Register counts a sale as a bill only once its amount is entered.
            - Small Queue safety fixes (no crash if left open past midnight; clearer "recent records" labels).
            (Payroll PF/ESIC/PT math was reviewed and LEFT AS-IS per your instruction.)

            **New in 2.3 - the app now handles years of data without slowing down or running out
            of memory.** As the Queue Management list builds up a lot of OLD, already-closed
            customers (older than ~3 months), the app automatically moves them into a safe archive
            file kept on the phone. The live screens stay small and fast, even after years of use.
            - **Nothing is ever deleted.** Archived customers are written to the archive file FIRST
              (and only then removed from the live list), so a crash can never lose anything.
            - The archive **rides along in every backup** and comes back on Restore - so moving to a
              new phone keeps your full history.
            - Today / this-week / this-month Queue screens, reports and follow-ups are unaffected
              (they already only look at recent data).

            Also included (performance work for large datasets):
            - Much faster once a lot of data builds up (large key scans are no longer O(n^2)).
            - Smoother scrolling in long lists (Expense ledger and CRO Audit history now show the
              most-recent rows with a "filter to narrow" notice instead of painting thousands at once).
            - The Home dashboard no longer re-parses the big Queue blob on every refresh.
            - Backup / Restore of a large dataset no longer freezes (writes apply in one fast bulk pass).
            - Expense bill photos stored as separate files (kept out of the database).

            **Before you install:** open the app you have now, go to Settings -> Backup and save a
            backup first. Because these test builds are signed freshly each time, Android may ask you
            to uninstall the old app before installing this one - so keep that backup safe, then
            Restore it after installing. To roll back, reinstall a previous build from this release's
            asset history.

            Download **SaagarControlCentre-latest.apk** below, copy it to the phone, and tap
            to install (allow "install from unknown sources").
          files: out/*.apk
          make_latest: true
