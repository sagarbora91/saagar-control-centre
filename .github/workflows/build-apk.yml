name: Build Saagar Control Centre APK

# Builds the offline Android APK on GitHub's servers.
# Runs automatically on every upload/change, and can be run manually
# from the Actions tab ("Run workflow"). The finished APK is published
# both as a downloadable Release and as a build artifact.

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Patch Android project (V5 build 2.4 — version bump + offline hygiene)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          GR=android/app/build.gradle
          # Remove unused INTERNET permission (app is fully offline) — BUILD_NOTES step 2
          sed -i '/android.permission.INTERNET/d' "$MF" || true
          # Bump version — BUILD_NOTES step 3
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 8/' "$GR" || true
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "2.5-year-test"/' "$GR" || true
          echo "----- AndroidManifest permissions -----"
          grep -n "uses-permission" "$MF" || echo "(no uses-permission lines — INTERNET removed)"
          echo "----- versioning -----"
          grep -nE "versionCode|versionName" "$GR" || true
          # Disable Android force-dark so WebView cannot invert module text (API 29-32;
          # API 33+ is handled by CSS color-scheme:light). Patch every values*/styles.xml.
          for SX in $(find android/app/src/main/res -name styles.xml); do
            if ! grep -q 'android:forceDarkAllowed' "$SX"; then
              sed -i -E '0,/<style [^>]*>/s//&\n        <item name="android:forceDarkAllowed">false<\/item>/' "$SX" || true
            fi
            echo "----- $SX -----"; grep -n 'forceDarkAllowed' "$SX" || echo "(forceDarkAllowed not set in $SX)"
          done

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "out/SaagarControlCentre-v5-build2.4-YEARTEST-$(date +%Y%m%d).apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/SaagarControlCentre-year-test.apk
          ls -lh out

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaagarControlCentre-APK
          path: out/*.apk
          retention-days: 90

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: year-test
          prerelease: true
          name: "Saagar Control Centre — 1-YEAR TEST build (build 2.5 · a full year of demo data @ 50/day)"
          body: |
            TEST BUILD — pre-loaded with a FULL YEAR of dummy data so you can feel how the app behaves
            after a year of real use. This is **NOT** your production app — keep using the CLEAN `latest`
            build for real shop data.

            **Build 2.5 fixes the first-launch freeze.** The earlier 1-year build wrote the whole database
            to disk after every step while seeding (~56 times) — that froze the phone and force-closed it.
            It now builds everything in memory and saves to disk **once**, so first launch stays responsive.
            Includes all the build-2.4 audit fixes too.

            Inside: one full year (~365 days) at ~50 walk-ins/day across all 10 modules — 15 employees,
            ~15,000 Queue customers (recent ~90 days live, the older ~11,000 auto-archived), a year of
            sales, service jobs, expenses, grooming, CRO audits, stock counts, leaves and tax. First
            launch shows a short **"Preparing one year of demo data…"** progress bar while it builds in
            the background — it no longer freezes / force-closes like before.

            Includes the 1-year function-audit fixes: tax due-dates (timezone), cash carry-forward across
            closed-gap days, leave AM+PM half-days, DSR bill counting, Queue safety guards, and Service
            reports. (Payroll PF/ESIC/PT left as-is per your instruction.)

            Use it to scroll the long lists, open every module + report, and confirm everything stays
            smooth at a year's scale. To get back to a clean app: Settings → Factory Reset, or reinstall
            the CLEAN `latest` build.

            **Install:** Android may ask you to uninstall the current app first (signed freshly). Download
            **SaagarControlCentre-year-test.apk** below, copy it to the phone, and tap to install (allow
            "install from unknown sources"). This will NOT overwrite your CLEAN `latest` release.
          files: out/*.apk
          make_latest: false
