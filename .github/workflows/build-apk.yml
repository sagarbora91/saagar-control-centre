name: Build Saagar Control Centre APK

# Builds the offline Android APK on GitHub's servers.
# Runs automatically on every upload/change, and can be run manually
# from the Actions tab ("Run workflow"). The finished APK is published
# both as a downloadable Release and as a build artifact.

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Patch Android project (V5 build 1.2 — version bump + offline hygiene)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          GR=android/app/build.gradle
          # Remove unused INTERNET permission (app is fully offline) — BUILD_NOTES step 2
          sed -i '/android.permission.INTERNET/d' "$MF" || true
          # Bump version — BUILD_NOTES step 3
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 2/' "$GR" || true
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "1.2"/' "$GR" || true
          echo "----- AndroidManifest permissions -----"
          grep -n "uses-permission" "$MF" || echo "(no uses-permission lines — INTERNET removed)"
          echo "----- versioning -----"
          grep -nE "versionCode|versionName" "$GR" || true
          # Disable Android force-dark so WebView cannot invert module text (API 29-32;
          # API 33+ is handled by CSS color-scheme:light). Patch every values*/styles.xml.
          for SX in $(find android/app/src/main/res -name styles.xml); do
            if ! grep -q 'android:forceDarkAllowed' "$SX"; then
              sed -i -E '0,/<style [^>]*>/s//&\n        <item name="android:forceDarkAllowed">false<\/item>/' "$SX" || true
            fi
            echo "----- $SX -----"; grep -n 'forceDarkAllowed' "$SX" || echo "(forceDarkAllowed not set in $SX)"
          done

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "out/SaagarControlCentre-v5-build1.2-$(date +%Y%m%d).apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/SaagarControlCentre-latest.apk
          ls -lh out

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaagarControlCentre-APK
          path: out/*.apk
          retention-days: 90

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Saagar Control Centre — V5 (build 1.2)"
          body: |
            Fully offline Android build — Control Centre **V5 shell, build 1.2**.
            New: DM Serif/Sans + navy-gold UI, bottom nav, Today's Brief, Reports
            tab, action-only attention list. Includes the rebuilt Expense Manager
            (central ledger). INTERNET permission removed (fully offline).
            Existing data is preserved on update.

            Download **SaagarControlCentre-latest.apk** below, copy it to the
            phone, and tap to install (allow "install from unknown sources").
          files: out/*.apk
          make_latest: true
