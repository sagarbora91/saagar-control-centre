name: Build Saagar Control Centre APK

# Builds the offline Android APK on GitHub's servers.
# Runs automatically on every upload/change, and can be run manually
# from the Actions tab ("Run workflow"). The finished APK is published
# both as a downloadable Release and as a build artifact.

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Patch Android project (V5 build 2.1 — version bump + offline hygiene)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          GR=android/app/build.gradle
          # Remove unused INTERNET permission (app is fully offline) — BUILD_NOTES step 2
          sed -i '/android.permission.INTERNET/d' "$MF" || true
          # Bump version — BUILD_NOTES step 3
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 5/' "$GR" || true
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "2.1"/' "$GR" || true
          echo "----- AndroidManifest permissions -----"
          grep -n "uses-permission" "$MF" || echo "(no uses-permission lines — INTERNET removed)"
          echo "----- versioning -----"
          grep -nE "versionCode|versionName" "$GR" || true
          # Disable Android force-dark so WebView cannot invert module text (API 29-32;
          # API 33+ is handled by CSS color-scheme:light). Patch every values*/styles.xml.
          for SX in $(find android/app/src/main/res -name styles.xml); do
            if ! grep -q 'android:forceDarkAllowed' "$SX"; then
              sed -i -E '0,/<style [^>]*>/s//&\n        <item name="android:forceDarkAllowed">false<\/item>/' "$SX" || true
            fi
            echo "----- $SX -----"; grep -n 'forceDarkAllowed' "$SX" || echo "(forceDarkAllowed not set in $SX)"
          done

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "out/SaagarControlCentre-1YR-TEST-$(date +%Y%m%d).apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/SaagarControlCentre-1yr-test.apk
          ls -lh out

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SaagarControlCentre-1YR-TEST-APK
          path: out/*.apk
          retention-days: 90

      - name: Publish APK as a downloadable Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: year-test
          name: "Saagar CC - 1-YEAR TEST DATA (feel the speed/scroll) - DUMMY DATA"
          prerelease: true
          make_latest: false
          body: |
            TEST BUILD - DUMMY DATA. Pre-loaded with a FULL YEAR of fake data (365 days,
            ~50 walk-ins/day, 15 employees -> ~15,000 queue records, ~17 MB) so you can feel the
            real speed and scrolling at scale. About screen shows build **2.1-1YR-TEST**.

            First launch seeds the whole year - this takes a while (a one-time ~30-60 s on the
            phone); let it finish without closing the app. Then exercise it hard:
            - Open Expense -> the ledger should scroll smoothly (it shows the 200 most-recent rows).
            - Open the Queue, Reports, and the Home dashboard - should feel responsive, not frozen.
            - Move around, open a few PDF reports, switch modules.
            This build carries build 2.1's performance fixes (no more O(n^2) key scans, capped
            ledger render, memoized Home). Tell me anything that still feels slow or janky.

            This is SEPARATE from your daily build - it does NOT replace "latest". Your clean
            build 2.1 (for real shop data) stays on the main "latest" release.

            Install: uninstall any existing app first, then install
            **SaagarControlCentre-1yr-test.apk** below (allow "install from unknown sources").
          files: out/*.apk
